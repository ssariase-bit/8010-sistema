<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8010 Urban Living — Sistema Operativo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
:root{
  /* ── PALETA 8010 URBAN LIVING ── */
  --negro:#0A0A0A;        /* Topbar / Login bg */
  --dorado:#B8963E;       /* Acento marca */
  --dorado-c:#FBF3E2;     /* Dorado muy claro */
  /* Dashboard — legible y elegante */
  --azul:#1D3461;--azul-m:#2B4A8A;--azul-c:#D6E0F5;
  --verde:#1A5C2E;--verde-m:#27AE60;--verde-c:#D4EDDA;
  --rojo:#C0392B;--rojo-c:#FDECEA;
  --naran:#D35400;--naran-c:#FEF0E6;
  --gris:#F2F3F5;         /* Fondo principal */
  --gris-b:#E2E4E8;       /* Bordes */
  --gris-t:#6B7280;       /* Texto secundario */
  --blanco:#FFFFFF;
  --sombra:0 1px 8px rgba(0,0,0,.08);
}
body{background:var(--gris);min-height:100vh}

/* ── LOGIN ─────────────────────────────────────────────── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--negro)}
.login-box{background:#141414;border:1px solid #2a2a2a;border-radius:4px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 30px 80px rgba(0,0,0,.6)}
.login-logo{text-align:center;margin-bottom:36px}
.login-logo .logo-grande{font-size:52px;font-weight:900;color:white;font-family:Georgia,serif;letter-spacing:-2px;line-height:1}
.login-logo .logo-sep{color:var(--dorado);font-weight:100}
.login-logo .logo-sub{font-size:11px;letter-spacing:5px;color:rgba(255,255,255,.4);margin-top:8px;text-transform:uppercase}
.login-logo .logo-sub2{font-size:9px;letter-spacing:3px;color:rgba(201,168,76,.5);text-transform:uppercase;margin-top:3px}
.login-logo .dot{display:block;width:40px;height:1px;background:var(--dorado);margin:16px auto;opacity:.4}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--gris-t);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
#login-screen .form-group label{color:rgba(255,255,255,.5)}
.form-group input,.form-group select,.form-group textarea{width:100%;border:1px solid var(--gris-b);border-radius:6px;padding:10px 14px;font-size:14px;color:#1F2937;transition:border .2s;background:var(--blanco)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--dorado);box-shadow:0 0 0 3px rgba(184,150,62,.12)}
/* Login — inputs oscuros */
#login-screen .form-group input{background:#1e1e1e;color:#eee;border-color:#333}
#login-screen .form-group input:focus{border-color:var(--dorado);box-shadow:0 0 0 2px rgba(184,150,62,.2)}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.btn-primary{background:var(--dorado);color:var(--negro);font-weight:700;letter-spacing:.3px}
.btn-primary:hover{background:#a07c32;transform:translateY(-1px);box-shadow:0 4px 12px rgba(184,150,62,.35)}
.btn-success{background:var(--verde);color:var(--blanco)}
.btn-success:hover{background:#2d4a1e;transform:translateY(-1px)}
.btn-danger{background:var(--rojo);color:var(--blanco)}
.btn-sm{width:auto;padding:6px 14px;font-size:12px}
.btn-outline{background:transparent;border:1.5px solid var(--azul-m);color:var(--azul-m)}
.btn-outline:hover{background:var(--azul-m);color:var(--blanco)}
.error-msg{color:var(--rojo);font-size:12px;margin-top:8px;text-align:center}

/* ── APP SHELL ─────────────────────────────────────────── */
#app{display:none;min-height:100vh}
.topbar{background:var(--negro);color:var(--blanco);padding:0 20px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.4);border-bottom:1px solid rgba(201,168,76,.25)}
.topbar-brand{display:flex;align-items:center;gap:14px}
.logo-8010{display:flex;align-items:center;gap:0}
.logo-8010 .num{font-size:26px;font-weight:900;color:white;font-family:Georgia,serif;letter-spacing:-1px;line-height:1}
.logo-8010 .sep{font-size:26px;font-weight:100;color:var(--dorado);margin:0 1px;line-height:1}
.logo-8010 .sub-logo{display:flex;flex-direction:column;margin-left:10px;border-left:1px solid rgba(201,168,76,.4);padding-left:10px}
.logo-8010 .sub-logo span{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.6);font-weight:400;text-transform:uppercase;line-height:1.6}
.logo-8010 .sub-logo span:first-child{color:var(--dorado);font-size:8px}
.topbar-user{display:flex;align-items:center;gap:12px;font-size:13px}
.rol-badge{background:rgba(201,168,76,.2);border:1px solid rgba(201,168,76,.4);color:var(--dorado);padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.btn-logout{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .2s}
.btn-logout:hover{background:rgba(255,255,255,.1);color:white;border-color:rgba(255,255,255,.4)}

/* ── NAV ──────────────────────────────────────────────── */
.sidebar{width:230px;background:var(--blanco);border-right:1px solid var(--gris-b);height:calc(100vh - 64px);position:fixed;top:64px;left:0;overflow-y:scroll;overflow-x:hidden;box-shadow:2px 0 8px rgba(0,0,0,.06);scrollbar-width:thin;scrollbar-color:var(--gris-b) transparent}
.nav-section{padding:20px 16px 6px;font-size:9px;font-weight:700;color:var(--gris-t);text-transform:uppercase;letter-spacing:1.5px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-radius:0;margin:0;font-size:12.5px;color:#374151;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{background:var(--gris);color:var(--azul);border-left-color:var(--gris-b)}
.nav-item.active{background:var(--dorado-c);color:var(--negro);font-weight:700;border-left-color:var(--dorado)}
.nav-section{padding:16px 12px 4px;font-size:10px;font-weight:700;color:var(--gris-t);text-transform:uppercase;letter-spacing:.8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-radius:8px;margin:2px 8px;font-size:13px;color:#444;transition:all .15s}
.nav-item:hover{background:var(--gris)}
.nav-item.active{background:var(--azul);color:var(--blanco);font-weight:600}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.main{margin-left:230px;padding:28px;min-height:calc(100vh - 64px);background:var(--gris)}

/* ── CARDS & KPIs ──────────────────────────────────────── */
.page-title{font-size:20px;font-weight:700;color:var(--azul);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:var(--blanco);border-radius:12px;padding:18px 20px;box-shadow:var(--sombra);border-left:4px solid}
.kpi .kpi-val{font-size:32px;font-weight:800;line-height:1;margin:6px 0}
.kpi .kpi-lbl{font-size:11px;color:var(--gris-t);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.kpi .kpi-sub{font-size:11px;color:#999;margin-top:4px}
.kpi.k-azul{border-color:var(--azul-m)}.kpi.k-azul .kpi-val{color:var(--azul)}
.kpi.k-verde{border-color:var(--verde-m)}.kpi.k-verde .kpi-val{color:var(--verde)}
.kpi.k-naran{border-color:var(--naran)}.kpi.k-naran .kpi-val{color:var(--naran)}
.kpi.k-rojo{border-color:var(--rojo)}.kpi.k-rojo .kpi-val{color:var(--rojo)}

.card{background:var(--blanco);border-radius:12px;padding:20px;box-shadow:var(--sombra);margin-bottom:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:13px;font-weight:700;color:var(--azul);text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;gap:6px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}

/* ── RACK ─────────────────────────────────────────────── */
.rack-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px}
.rack-piso{grid-column:1/-1;font-size:10px;font-weight:700;color:var(--azul);background:var(--gris);padding:4px 8px;border-radius:4px;margin-top:4px}
.rack-apto{border-radius:8px;padding:8px 6px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .15s;position:relative}
.rack-apto:hover{transform:scale(1.05);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.rack-apto .apt-num{font-size:13px;font-weight:700}
.rack-apto .apt-est{font-size:9px;margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.rack-apto .apt-hues{font-size:8px;margin-top:1px;opacity:.8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60px}
.apto-Ocupado{background:var(--verde-c);color:var(--verde);border-color:#b8dba8}
.apto-Libre{background:#f8f9fa;color:#888;border-color:#e0e0e0}
.apto-CheckIn{background:#ddeeff;color:var(--azul-m);border-color:var(--azul-c)}
.apto-CheckOut{background:var(--naran-c);color:var(--naran);border-color:#f5d9a0}
.apto-Limpieza{background:#f0e6ff;color:#6b21a8;border-color:#d8b4fe}
.apto-Mantenimiento{background:var(--rojo-c);color:var(--rojo);border-color:#f0b4a0}
.apto-Bloqueado{background:#f0f0f0;color:#888;border-color:#ccc}
.rack-leyenda{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--gris-b)}
.ley{display:flex;align-items:center;gap:5px;font-size:11px;color:#555}
.ley-dot{width:12px;height:12px;border-radius:3px}

/* ── TABLAS ───────────────────────────────────────────── */
.tabla{width:100%;border-collapse:collapse;font-size:13px}
.tabla th{background:var(--azul);color:var(--blanco);padding:10px 12px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.tabla th:first-child{border-radius:8px 0 0 0}.tabla th:last-child{border-radius:0 8px 0 0}
.tabla td{padding:10px 12px;border-bottom:1px solid var(--gris-b);vertical-align:middle}
.tabla tr:hover td{background:#fafbfc}
.tabla tr:last-child td{border-bottom:none}

/* ── BADGES ───────────────────────────────────────────── */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.b-alta{background:var(--rojo-c);color:var(--rojo)}
.b-media{background:var(--naran-c);color:var(--naran)}
.b-baja{background:var(--verde-c);color:var(--verde)}
.b-abierto{background:#ddeeff;color:var(--azul-m)}
.b-proceso{background:var(--naran-c);color:var(--naran)}
.b-resuelto{background:var(--verde-c);color:var(--verde)}
.b-escalado{background:var(--rojo-c);color:var(--rojo)}

/* ── FORMULARIOS ──────────────────────────────────────── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-row.col3{grid-template-columns:1fr 1fr 1fr}
.form-row.col1{grid-template-columns:1fr}
.form-section{background:var(--gris);border-radius:8px;padding:16px;margin-bottom:16px}
.form-section-title{font-size:11px;font-weight:700;color:var(--azul-m);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
textarea{resize:vertical;min-height:80px}
.form-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:24px;padding-top:16px;border-top:1px solid var(--gris-b)}

/* ── MODALES ──────────────────────────────────────────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--blanco);border-radius:16px;padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-title{font-size:16px;font-weight:700;color:var(--azul);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.modal-close{margin-left:auto;background:none;border:none;cursor:pointer;font-size:20px;color:#999}

/* ── TOAST ────────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--azul);color:var(--blanco);padding:14px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.2);transform:translateY(100px);opacity:0;transition:all .3s;z-index:9999;max-width:320px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:var(--verde)}
.toast.error{background:var(--rojo)}

/* ── EMPTY STATE ──────────────────────────────────────── */
.empty{text-align:center;padding:40px;color:#999}
.empty .empty-icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px}

/* ── RESPONSIVE ───────────────────────────────────────── */
@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0;padding:16px}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .form-row{grid-template-columns:1fr}
  .form-row.col3{grid-template-columns:1fr}
}

/* ── UTIL ─────────────────────────────────────────────── */
.hidden{display:none!important}
.loading{opacity:.5;pointer-events:none}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.text-center{text-align:center}
.mt-8{margin-top:8px}
.mb-16{margin-bottom:16px}
.flex{display:flex}.gap-8{gap:8px}.items-center{align-items:center}
.text-sm{font-size:12px;color:var(--gris-t)}
.divider{border:none;border-top:1px solid var(--gris-b);margin:16px 0}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════
     LOGIN
═══════════════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-grande">80<span class="logo-sep">|</span>10</div>
      <div class="logo-sub">Ochenta Diez</div>
      <div class="logo-sub2">Urban Living</div>
      <div class="dot"></div>
      <p style="font-size:11px;color:rgba(255,255,255,.35);letter-spacing:1px">SISTEMA OPERATIVO</p>
    </div>
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="login-email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" onclick="doLogin()">Ingresar al sistema</button>
    <p class="error-msg hidden" id="login-error"></p>
    <p class="text-sm text-center mt-8">¿Problemas para ingresar? Contacta a Gerencia.</p>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     APP
═══════════════════════════════════════════════════════ -->
<div id="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="logo-8010">
        <span class="num">80</span><span class="sep">|</span><span class="num">10</span>
        <div class="sub-logo">
          <span>Ochenta Diez</span>
          <span style="color:rgba(255,255,255,.5)">Urban Living</span>
        </div>
      </div>
      <span id="topbar-edificio" style="font-size:11px;color:rgba(255,255,255,.4);margin-left:8px"></span>
    </div>
    <div class="topbar-user">
      <span id="topbar-nombre">—</span>
      <span class="rol-badge" id="topbar-rol">—</span>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <!-- Se genera por rol -->
  </div>

  <!-- MAIN CONTENT -->
  <div class="main" id="main-content">
    <!-- Se carga dinámicamente -->
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     MODAL APTO
═══════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-apto">
  <div class="modal">
    <div class="modal-title">
      🏠 Actualizar Apartamento <span id="modal-apto-num" style="color:var(--azul-m)"></span>
      <button class="modal-close" onclick="closeModal('modal-apto')">✕</button>
    </div>
    <div class="form-group">
      <label>Estado</label>
      <select id="m-estado">
        <option>Libre</option><option>Ocupado</option><option>Check-in hoy</option>
        <option>Check-out hoy</option><option>Limpieza</option><option>Mantenimiento</option><option>Bloqueado</option>
      </select>
    </div>
    <div class="form-group">
      <label>Huésped / Empresa</label>
      <input type="text" id="m-huesped" placeholder="Nombre completo o empresa">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Tipo de apto</label>
        <select id="m-tipo">
          <option value="">— Seleccionar —</option>
          <option>Estudio</option><option>1 Alcoba</option><option>2 Alcobas</option><option>Suite</option>
        </select>
      </div>
      <div class="form-group">
        <label>Canal</label>
        <select id="m-canal">
          <option value="">— Seleccionar —</option>
          <option>Directo</option><option>Airbnb</option><option>Booking</option>
          <option>Expedia</option><option>Referido</option><option>Corporativo</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Check-in</label>
        <input type="date" id="m-checkin">
      </div>
      <div class="form-group">
        <label>Check-out</label>
        <input type="date" id="m-checkout">
      </div>
    </div>
    <div class="form-group">
      <label>Tarifa por noche ($)</label>
      <input type="number" id="m-tarifa" placeholder="0">
    </div>

    <!-- Toggle Apto Completo — solo para aptos con variante A -->
    <div id="m-completo-section" style="display:none;background:#FEF0E6;border:2px solid var(--naran);border-radius:10px;padding:14px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:12px">
        <input type="checkbox" id="m-completo" style="width:20px;height:20px;cursor:pointer" onchange="toggleAptoCompleto(this)">
        <div>
          <label for="m-completo" style="font-weight:700;color:var(--naran);cursor:pointer;font-size:13px">
            🏠 Apto Completo (incluye habitación A)
          </label>
          <div style="font-size:11px;color:#7c4a03;margin-top:2px">
            Al activar, la habitación A queda bloqueada automáticamente
          </div>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>Observaciones</label>
      <textarea id="m-obs" placeholder="Notas sobre este apartamento..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-outline btn-sm" onclick="closeModal('modal-apto')">Cancelar</button>
      <button class="btn btn-danger btn-sm" onclick="declinarLimpieza()" title="Registra novedad automática: el arrendatario no quiere limpieza hoy">
        🚫 Declina limpieza
      </button>
      <button class="btn btn-primary btn-sm" onclick="saveApto()">💾 Guardar cambios</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>
<!-- FAB — Reportar novedad rápida -->
<button id="fab-novedad" onclick="loadView('novedad-form')" title="Reportar novedad"
  style="display:none;position:fixed;bottom:28px;left:28px;width:52px;height:52px;border-radius:50%;background:var(--rojo);color:white;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(192,57,43,.5);z-index:9998;transition:transform .15s"
  onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">⚠️</button>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIGURACIÓN SUPABASE — reemplazar con tus datos

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pwd   = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.classList.add('hidden');
  if (!email || !pwd) { showError(errEl, 'Ingresa tu correo y contraseña.'); return; }

  const btn = document.querySelector('#login-screen .btn');
  btn.innerHTML = '<span class="spinner"></span>Ingresando...';
  btn.disabled = true;

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
  if (error) {
    showError(errEl, 'Credenciales incorrectas. Verifica tu correo y contraseña.');
    btn.innerHTML = 'Ingresar al sistema'; btn.disabled = false; return;
  }
  currentUser = data.user;
  await loadProfile();
}

async function loadProfile() {
  const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  currentProfile = data;
  initApp();
}

async function doLogout() {
  await sb.auth.signOut();
  currentUser = null; currentProfile = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function showError(el, msg) { el.textContent = msg; el.classList.remove('hidden'); }

// ═══════════════════════════════════════════════════════════
// INIT APP
// ═══════════════════════════════════════════════════════════
function initApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('topbar-nombre').textContent = currentProfile?.nombre || currentUser.email;
  document.getElementById('topbar-rol').textContent = currentProfile?.rol || 'usuario';
  document.getElementById('topbar-edificio').textContent = currentProfile?.edificio || '';
  buildSidebar();
  // Mostrar FAB de novedad rápida para roles operativos
  const rolOp = ['administrador','recepcion','gerencia_operativa','gerente_general'];
  if (rolOp.includes(currentProfile?.rol)) {
    document.getElementById('fab-novedad').style.display = 'block';
  }
  loadView('dashboard');
}

function buildSidebar() {
  const rol = currentProfile?.rol || 'recepcion';
  const items = NAV_ITEMS[rol] || NAV_ITEMS.recepcion;
  const sb2 = document.getElementById('sidebar');
  sb2.innerHTML = items.map(item => {
    if (item.section) return `<div class="nav-section">${item.section}</div>`;
    return `<div class="nav-item" id="nav-${item.id}" onclick="loadView('${item.id}')">
      <span class="icon">${item.icon}</span>${item.label}
    </div>`;
  }).join('');
}

function setActiveNav(id) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-' + id);
  if (el) el.classList.add('active');
}

// Estado global del mes del rack
window._rackMes = window._rackMes ?? new Date().getMonth();
window._rackYear = window._rackYear ?? new Date().getFullYear();

function cambiarMesRack(delta) {
  let m = window._rackMes + delta;
  let y = window._rackYear;
  if (m > 11) { m = 0; y++; }
  if (m < 0)  { m = 11; y--; }
  window._rackMes = m;
  window._rackYear = y;
  loadView('rack');
}

async function renderRack() {
  // Auto-refresh cada 60s para ver cambios de otros usuarios
  clearTimeout(window._rackTimer);
  window._rackTimer = setTimeout(() => {
    if (document.querySelector('.nav-item.active')?.dataset?.view === 'rack' ||
        window._currentView === 'rack') renderRack();
  }, 60000);

  const rol = currentProfile?.rol;
  const canEdit = ['gerente_general','gerencia_operativa','administrador','recepcion'].includes(rol);
  const now = new Date();
  const year = window._rackYear;
  const month = window._rackMes;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const monthStart = `${year}-${String(month+1).padStart(2,'0')}-01`;
  const monthEnd = `${year}-${String(month+1).padStart(2,'0')}-${String(daysInMonth).padStart(2,'0')}`;
  const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const dayNames = ['D','L','M','Mi','J','V','S'];

  const { data: rawRack, error: rackErr } = await sb.from('rack').select('*')
    .gte('fecha', monthStart).lte('fecha', monthEnd)
    .order('estado', { ascending: true }); // Libre < Ocupado → Ocupado gana en el map
  if (rackErr) { document.getElementById('main-content').innerHTML = `<div class="empty"><div class="empty-icon">❌</div><p>Error cargando rack: ${rackErr.message}</p></div>`; return; }
  let allRack = rawRack || [];

  // AUTO-INICIALIZAR: solo si estamos viendo el mes actual
  const APTOS_DEFAULT = [
    '301','302','303','304',
    '401','402','403',
    '501','501A','502','502A',
    '601','601A','602','602A',
    '701','701A','702','702A',
    '801','801A','802','802A',
    '901','901A','902','902A',
    '1001','1001A','1002','1002A',
    '1101','1102'
  ];
  const esMesActual = (month === now.getMonth() && year === now.getFullYear());
  if (esMesActual && canEdit) {
    const todayStr = TODAY;
    const aptosDehoy = allRack.filter(r => r.fecha === todayStr).map(r => r.apto);
    const faltanHoy = APTOS_DEFAULT.filter(a => !aptosDehoy.includes(a));
    if (faltanHoy.length > 0) {
      const newRows = faltanHoy.map(a => ({ fecha: todayStr, apto: a, estado: 'Libre', updated_by: currentUser.id }));
      await sb.from('rack').upsert(newRows, { onConflict: 'fecha,apto', ignoreDuplicates: true });
      const { data: refreshed } = await sb.from('rack').select('*').gte('fecha', monthStart).lte('fecha', monthEnd);
      if (refreshed) allRack = refreshed;
    }
  }

  // Construir mapa: {apto: {dia: {estado, huesped, id}}}
  const rack = {};
  allRack.forEach(r => {
    const dia = parseInt(r.fecha.split('-')[2]);
    if (!rack[r.apto]) rack[r.apto] = {};
    rack[r.apto][dia] = r;
  });

  let aptos = [...new Set((allRack||[]).map(r => r.apto))].sort((a,b) => {
    const na = parseInt(a); const nb = parseInt(b);
    return isNaN(na)||isNaN(nb) ? a.localeCompare(b) : na-nb;
  });
  // Para meses sin datos usa la lista de aptos por defecto
  if (aptos.length === 0) aptos = [...APTOS_DEFAULT];

  const colorMap = {
    'Ocupado':      {bg:'#C6EFCE',color:'#276221',code:'IN'},

  // Indicadores del Rack Gráfico para este mes
  const _ind2026 = {'2026-01':{noches:374,disp:651,adr:796301,ocu:0.5745},'2026-02':{noches:507,disp:588,adr:729055,ocu:0.8622},'2026-03':{noches:491,disp:651,adr:752681,ocu:0.7542},'2026-04':{noches:397,disp:630,adr:733852,ocu:0.6302},'2026-05':{noches:612,disp:651,adr:716838,ocu:0.9401},'2026-06':{noches:434,disp:630,adr:708910,ocu:0.6889},'2026-07':{noches:380,disp:651,adr:636366,ocu:0.5837},'2026-08':{noches:290,disp:651,adr:619572,ocu:0.4455},'2026-09':{noches:210,disp:630,adr:570174,ocu:0.3333},'2026-10':{noches:217,disp:651,adr:551781,ocu:0.3333},'2026-11':{noches:213,disp:630,adr:572487,ocu:0.3381},'2026-12':{noches:78,disp:651,adr:686969,ocu:0.1198}};
  const mesKey = `${year}-${String(month+1).padStart(2,'0')}`;

  const estadosHoy = aptos.map(a => rack[a]?.[todayDay]?.estado || 'Libre');

  const ckiHoy   = estadosHoy.filter(s=>s==='Check-in hoy').length;
  const ckoHoy   = estadosHoy.filter(s=>s==='Check-out hoy').length;
  const ocuPct   = indMes ? Math.round(indMes.ocu * 100) : Math.round(ocupHoy / (aptos.length||1) * 100);

  const CELL_W = 36; // ancho celda en px (más grande)
  const APTO_W = 70;
  const HUES_W = 180;

  // Generar encabezados de días — fix: usar now.getMonth() (número) no month (string)
  const diaHeaders = Array.from({length:daysInMonth},(_,i)=>{
    const d = i+1;
    const dow = new Date(year, month, d).getDay();
    const isHoy = esMesActual && d === todayDay;
    const esFinde = dow===0||dow===6;
    return `<th style="min-width:${CELL_W}px;width:${CELL_W}px;padding:2px;text-align:center;font-size:10px;background:${isHoy?'#1F3864':esFinde?'#8EA8C3':'#2F5597'};color:${isHoy?'#FFD700':'white'};position:sticky;top:0;white-space:nowrap;">

      const rec = rack[apto]?.[d];

      const cm = colorMap[est] || colorMap['Libre'];
      const isHoy = esMesActual && d === todayDay;
      const apellido = rec?.huesped ? rec.huesped.split(' ').slice(-1)[0].substring(0,5) : '';
      const border = isHoy ? '2px solid #1F3864' : '1px solid #ddd';

      const onclick = canEdit && rec?.id ? `openAptoModal('${rec.id}','${apto}')` : (canEdit ? `crearDiaRack('${apto}','${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}')` : '');

        <div style="font-size:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:${CELL_W-2}px;font-weight:600">${apellido}</div>
      </td>`;
    }).join('');
    // Huésped de hoy: buscar último estado no-Libre hacia atrás si hoy no tiene
    let estHoy = 'Libre', huesHoy = '';
    for(let d2 = todayDay; d2 >= 1; d2--) {
      const r = rack[apto]?.[d2];
      if(r && r.estado !== 'Libre') { estHoy = r.estado; huesHoy = r.huesped || ''; break; }
    }
    const cm = colorMap[estHoy] || colorMap['Libre'];
    const tarHoy = rack[apto]?.[todayDay]?.tarifa;
    // Indicadores de relación apto completo
    const esVarianteA = apto.endsWith('A');
    const padreDeA = Object.keys(APTO_A_MAP).find(k => APTO_A_MAP[k] === apto);
    const varADeEste = APTO_A_MAP[apto];
    const padreOcupadoHoy = padreDeA && rack[padreDeA]?.[todayDay]?.estado === 'Ocupado';
    const recHoyPadre = padreDeA ? rack[padreDeA]?.[todayDay] : null;
    const esAptoCompletoBloqueado = esVarianteA && estHoy === 'Bloqueado' && rack[apto]?.[todayDay]?.observaciones?.includes('Apto completo');

    return `<tr style="height:34px;${esVarianteA?'background:#fafafa;':''}">
      <td style="position:sticky;left:0;background:${esAptoCompletoBloqueado?'#FFD700':cm.bg};color:${esAptoCompletoBloqueado?'#7c4a03':cm.color};font-weight:800;padding:4px 8px;font-size:12px;border:1px solid #ccc;white-space:nowrap;z-index:2;min-width:${APTO_W}px">
        ${esVarianteA ? `<span style="font-size:9px;color:#9CA3AF">↳</span> ` : ''}${apto}
        ${esAptoCompletoBloqueado ? '<span style="font-size:9px">🔒</span>' : ''}
      </td>
      <td style="position:sticky;left:${APTO_W}px;background:${esAptoCompletoBloqueado?'#FFD700':cm.bg};color:${esAptoCompletoBloqueado?'#7c4a03':cm.color};padding:4px 8px;font-size:11px;border:1px solid #ccc;white-space:nowrap;z-index:2;min-width:${HUES_W}px;max-width:${HUES_W}px;overflow:hidden;text-overflow:ellipsis" title="${huesHoy}">
        ${esAptoCompletoBloqueado
          ? `<span style="font-size:11px;font-style:italic">🔒 Incluida en apto ${padreDeA}</span>`
          : `<div style="font-weight:600">${huesHoy || (estHoy==='Libre'?'<span style="color:#aaa;font-style:italic">Libre</span>':'')}</div>
             ${tarHoy ? `<div style="font-size:9px;opacity:.7">$${Number(tarHoy).toLocaleString('es-CO')}/noche</div>` : ''}
             ${varADeEste && estHoy==='Ocupado' && canEdit ? `<div style="margin-top:2px"><button onclick="openAptoModal('${rack[apto]?.[todayDay]?.id}','${apto}')" style="font-size:8px;background:var(--naran);color:white;border:none;border-radius:3px;padding:1px 5px;cursor:pointer">🏠 Completo?</button></div>` : ''}`}
      </td>
      ${celdas}
    </tr>`;
  }).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="page-title" style="display:flex;align-items:center;gap:12px">
      <button onclick="cambiarMesRack(-1)" style="background:var(--azul-m);color:white;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:16px;font-weight:bold">◀</button>
      🏠 Rack — ${monthNames[month]} ${year}
      <button onclick="cambiarMesRack(1)" style="background:var(--azul-m);color:white;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:16px;font-weight:bold">▶</button>
      ${month === now.getMonth() && year === now.getFullYear() ? '' : `<button onclick="window._rackMes=new Date().getMonth();window._rackYear=new Date().getFullYear();loadView('rack')" style="background:var(--gris-b);color:var(--azul);border:none;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:12px">Hoy</button>`}
    </div>
    <div class="kpi-grid" style="margin-bottom:14px">
      ${(() => {
        // KPIs del día con datos REALES del rack
        // Solo los 21 aptos base (excluye A variants del denominador)
        const APTOS_BASE = ['301','302','303','304','401','402','403','501','501A','502','502A','601','601A','602','602A','701','701A','702','702A','801','801A','802','802A','901','901A','902','902A','1001','1001A','1002','1002A','1101','1102'];
        const hoyAptos = APTOS_BASE.map(a => rack[a]?.[todayDay]);
        const ocupadosReal = hoyAptos.filter(r => r && (r.estado==='Ocupado'||r.estado==='Check-in hoy'||r.estado==='Check-out hoy')).length;
        const ocuPctReal = Math.round(ocupadosReal / 21 * 100);
        const conTarifa = hoyAptos.filter(r => r?.tarifa && Number(r.tarifa)>0);
        const adrReal = conTarifa.length>0 ? Math.round(conTarifa.reduce((s,r)=>s+Number(r.tarifa),0)/conTarifa.length) : 0;
        const ingresosHoy = conTarifa.reduce((s,r)=>s+Number(r.tarifa),0);
        return `
      <div class="kpi k-verde" style="border-left-width:5px">
        <div class="kpi-lbl">Ocupación hoy</div>
        <div class="kpi-val">${ocuPctReal}%</div>
        <div class="kpi-sub">${ocupadosReal} de 21 aptos</div>
      </div>
      <div class="kpi k-azul">
        <div class="kpi-lbl">ADR del día</div>
        <div class="kpi-val" style="font-size:20px">$${fmtNum(adrReal)}</div>
        <div class="kpi-sub">tarifa promedio/noche</div>
      </div>
      <div class="kpi k-verde">
        <div class="kpi-lbl">Ingresos del día</div>
        <div class="kpi-val" style="font-size:18px">$${fmtNum(ingresosHoy)}</div>
        <div class="kpi-sub">${conTarifa.length} aptos con tarifa</div>
      </div>`;
      })()}
      <div class="kpi k-azul"><div class="kpi-lbl">Check-in hoy</div><div class="kpi-val">${ckiHoy}</div></div>
      <div class="kpi k-naran"><div class="kpi-lbl">Check-out hoy</div><div class="kpi-val">${ckoHoy}</div></div>
      <div class="kpi k-azul"><div class="kpi-lbl">Ocupación del mes</div><div class="kpi-val">${ocuPct}%</div><div class="kpi-sub">${indMes ? indMes.noches+' de '+indMes.disp+' noches' : ''}</div></div>
      <div class="kpi k-verde"><div class="kpi-lbl">ADR del mes</div><div class="kpi-val" style="font-size:22px">$${indMes ? Number(indMes.adr).toLocaleString('es-CO') : '—'}</div></div>
    </div>
    <div class="card" style="padding:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px">
        <div class="card-title">📅 Calendario de ocupación ${monthNames[month]} ${year}${canEdit?' · clic en celda para actualizar':''}</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          ${Object.entries(colorMap).filter(([k])=>k!=='Bloqueado').map(([k,v])=>`<span style="display:flex;align-items:center;gap:4px;font-size:11px"><span style="display:inline-block;width:16px;height:16px;background:${v.bg};border:1px solid #ccc;border-radius:3px"></span>${k}</span>`).join('')}
        </div>
      </div>
      <div style="overflow-x:auto;overflow-y:auto;max-height:70vh">

              ${diaHeaders}

          <tbody>${filas !== '' ? filas : '<tr><td colspan="33" style="text-align:center;padding:20px;color:#999">Sin registros para este mes</td></tr>'}</tbody>
        </table>
      </div>
    </div>`;
}

async function crearDiaRack(apto, fecha) {
  // Upsert: crear o actualizar el registro para ese apto+día
  const { data } = await sb.from('rack').upsert({
    fecha, apto, estado: 'Libre', updated_by: currentUser.id
  }, { onConflict: 'fecha,apto' }).select().single();
  if (data) openAptoModal(data.id, apto);
  else {
    // Si no tiene constraint, buscar o crear
    const { data: existing } = await sb.from('rack').select('id').eq('fecha', fecha).eq('apto', apto).single();
    if (existing) openAptoModal(existing.id, apto);
    else {
      const { data: nuevo } = await sb.from('rack').insert({ fecha, apto, estado: 'Libre', updated_by: currentUser.id }).select().single();
      if (nuevo) openAptoModal(nuevo.id, apto);
    }
  }
}

let _aptoData = {};
// Mapa de aptos base → su variante A
const APTO_A_MAP = {
  '501':'501A','502':'502A',
  '601':'601A','602':'602A',
  '701':'701A','702':'702A',
  '801':'801A','802':'802A',
  '901':'901A','902':'902A',
  '1001':'1001A','1002':'1002A'
};

function toggleAptoCompleto(chk) {
  const aNum = document.getElementById('modal-apto-num').textContent;
  const varA = APTO_A_MAP[aNum];
  if (!varA) return;
  const msg = document.querySelector('#m-completo-section div div:last-child');
  if (chk.checked) {
    if (msg) msg.textContent = `✅ Apto ${varA} quedará BLOQUEADO al guardar`;
  } else {
    if (msg) msg.textContent = `Al activar, la habitación ${varA} queda bloqueada automáticamente`;
  }
}

async function openAptoModal(id, num) {
  const { data } = await sb.from('rack').select('*').eq('id', id).single();
  _aptoData = data || {};
  currentAptoId = id;
  document.getElementById('modal-apto-num').textContent = num;
  document.getElementById('m-estado').value  = data?.estado || 'Libre';
  document.getElementById('m-huesped').value = data?.huesped || '';
  document.getElementById('m-tipo').value    = data?.tipo || '';
  document.getElementById('m-canal').value   = data?.canal || '';
  document.getElementById('m-checkin').value = data?.checkin || '';
  document.getElementById('m-checkout').value= data?.checkout || '';
  document.getElementById('m-tarifa').value  = data?.tarifa || '';
  document.getElementById('m-obs').value     = data?.observaciones || '';

  // Mostrar toggle "Apto Completo" solo si tiene variante A
  const varA = APTO_A_MAP[num];
  const sec = document.getElementById('m-completo-section');
  if (varA && sec) {
    sec.style.display = 'block';
    // Detectar si la A ya está bloqueada por este apto
    const fecha = data?.fecha || TODAY;
    const { data: aData } = await sb.from('rack').select('estado,observaciones').eq('fecha', fecha).eq('apto', varA).single();
    const yaCompleto = aData?.estado === 'Bloqueado' && aData?.observaciones?.includes('Apto completo');
    document.getElementById('m-completo').checked = yaCompleto;
    const msg = sec.querySelector('div div:last-child');
    if (msg) msg.textContent = yaCompleto
      ? `✅ Apto ${varA} está BLOQUEADO (apto completo activo)`
      : `Al activar, la habitación ${varA} queda bloqueada automáticamente`;
  } else if (sec) {
    sec.style.display = 'none';
  }

  document.getElementById('modal-apto').classList.add('open');
}

async function saveApto() {
  const aNum = document.getElementById('modal-apto-num').textContent;
  const fecha = _aptoData?.fecha || TODAY;
  const esCompleto = document.getElementById('m-completo')?.checked || false;
  const varA = APTO_A_MAP[aNum];

  const updates = {
    estado: document.getElementById('m-estado').value,
    huesped: document.getElementById('m-huesped').value,
    tipo: document.getElementById('m-tipo').value,
    canal: document.getElementById('m-canal').value,
    checkin: document.getElementById('m-checkin').value || null,
    checkout: document.getElementById('m-checkout').value || null,
    tarifa: Number(document.getElementById('m-tarifa').value) || null,
    observaciones: document.getElementById('m-obs').value,
    updated_by: currentUser.id,
    updated_at: new Date().toISOString(),
  };

  const { error } = await sb.from('rack').update(updates).eq('id', currentAptoId);
  if (error) { showToast('Error al guardar', 'error'); return; }

  // Auto-bloquear/desbloquear la variante A
  if (varA && updates.estado === 'Ocupado') {
    // Buscar o crear registro de la A para esta fecha
    const { data: aRow } = await sb.from('rack').select('id').eq('fecha', fecha).eq('apto', varA).single();
    const aUpd = esCompleto
      ? { estado: 'Bloqueado', huesped: null, tarifa: null, observaciones: `Apto completo — incluido en ${aNum}`, updated_by: currentUser.id }
      : (aRow ? null : { estado: 'Libre', updated_by: currentUser.id }); // No tocar si existe con otro huésped

    if (esCompleto && aRow) {
      await sb.from('rack').update(aUpd).eq('id', aRow.id);
    } else if (esCompleto && !aRow) {
      await sb.from('rack').insert({ fecha, apto: varA, ...aUpd });
    } else if (!esCompleto && aRow?.estado === 'Bloqueado') {
      // Desbloquear si ya no es completo
      await sb.from('rack').update({ estado: 'Libre', huesped: null, observaciones: null, updated_by: currentUser.id }).eq('id', aRow.id);
    }
    if (esCompleto) showToast(`✅ Apto ${aNum} guardado — ${varA} bloqueado`, 'success');
  } else {
    showToast('✅ Apartamento actualizado', 'success');
  }

  closeModal('modal-apto');
  renderRack();
}

let novCount = 0;
function addNovedadLinea() {
  const id = novCount++;
  const div = document.createElement('div');
  div.style.cssText = 'display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;margin-bottom:8px;align-items:center';
  div.id = 'nov-line-' + id;
  div.innerHTML = `
    <input type="text" placeholder="Descripción de la novedad..." id="nov-desc-${id}" style="padding:9px 12px;border:1px solid var(--gris-b);border-radius:6px;font-size:13px">
    <input type="text" placeholder="Área / Apto" id="nov-area-${id}" style="padding:9px 12px;border:1px solid var(--gris-b);border-radius:6px;font-size:13px">
    <select id="nov-prio-${id}" style="padding:9px 8px;border:1px solid var(--gris-b);border-radius:6px;font-size:13px">
      <option value="Baja">🟢 Baja</option>
      <option value="Media" selected>🟡 Media</option>
      <option value="Alta">🔴 Alta</option>
    </select>
    <button type="button" onclick="document.getElementById('nov-line-${id}').remove()" style="background:var(--rojo-c);border:none;color:var(--rojo);border-radius:6px;padding:9px 12px;cursor:pointer;font-size:16px;font-weight:bold">✕</button>`;
  document.getElementById('novedades-turno-list').appendChild(div);
}

async function enviarTurno() {
  const entrega = document.getElementById('t-entrega').value.trim();
  const recibe  = document.getElementById('t-recibe').value.trim();
  if (!entrega || !recibe) { showToast('Completa quién entrega y quién recibe el turno', 'error'); return; }

  const btn = document.querySelector('.btn-success');
  btn.innerHTML = '<span class="spinner"></span>Enviando...'; btn.disabled = true;

  // Guardar novedades del turno
  const novLines = document.querySelectorAll('[id^="nov-line-"]');
  const novsToInsert = [];
  novLines.forEach((_, i) => {
    const desc = document.getElementById('nov-desc-' + i)?.value.trim();
    const prio = document.getElementById('nov-prio-' + i)?.value;
    const area = document.getElementById('nov-area-' + i)?.value.trim() || 'General';
    if (desc) novsToInsert.push({
      fecha: document.getElementById('t-fecha').value,
      turno: document.getElementById('t-turno').value,
      descripcion: desc,
      prioridad: prio,
      estado: 'Abierto',
      reportado_por: entrega,
      area: area,
      user_id: currentUser.id,
    });
  });
  if (novsToInsert.length > 0) await sb.from('novedades').insert(novsToInsert);

  // Guardar turno
  const { error } = await sb.from('turnos').insert({
    fecha: document.getElementById('t-fecha').value,
    turno: document.getElementById('t-turno').value,
    edificio: document.getElementById('t-edificio').value,
    admin_entrega: entrega,
    admin_recibe: recibe,
    aptos_ocupados: Number(document.getElementById('t-ocupados').value) || 0,
    aptos_disponibles: Number(document.getElementById('t-disponibles').value) || 0,
    checkins_hoy: Number(document.getElementById('t-checkins').value) || 0,
    checkouts_hoy: Number(document.getElementById('t-checkouts').value) || 0,
    caja_cierre: Number(document.getElementById('t-caja').value) || 0,
    pendientes: document.getElementById('t-pendientes').value,
    notas: document.getElementById('t-notas').value,
    user_id: currentUser.id,
  });

  if (error) { showToast('Error al enviar. Intenta de nuevo.', 'error'); btn.innerHTML = '📤 Enviar Informe de Turno'; btn.disabled = false; return; }
  showToast('✅ Informe guardado', 'success');

  // Construir resumen para WhatsApp / Email
  const fecha  = document.getElementById('t-fecha').value;
  const turno  = document.getElementById('t-turno').value;
  const ocup   = document.getElementById('t-ocupados').value || '0';
  const disp   = document.getElementById('t-disponibles').value || '0';
  const cki    = document.getElementById('t-checkins').value || '0';
  const cko    = document.getElementById('t-checkouts').value || '0';
  const caja   = Number(document.getElementById('t-caja').value || 0).toLocaleString('es-CO');
  const pend   = document.getElementById('t-pendientes').value.trim();
  const notas  = document.getElementById('t-notas').value.trim();
  const [y,m,d] = fecha.split('-');

  const novResumen = novsToInsert.length > 0
    ? novsToInsert.map(n => `▪️ [${n.prioridad}] ${n.area !== 'General' ? n.area+': ' : ''}${n.descripcion}`).join('\n')
    : '▪️ Sin novedades ✓';

  // Guardar número WhatsApp para próxima vez
  const waPhone = document.getElementById('t-waphone')?.value.trim().replace(/\D/g,'') || '';
  if (waPhone) localStorage.setItem('wa_phone', waPhone);

  const msgWA = `🏢 *8010 Urban Living — Cierre de Turno*
📅 Fecha: ${d}/${m}/${y}
🕐 Turno: ${turno}
👤 Entrega: ${entrega}
👤 Recibe: ${recibe}

*OCUPACIÓN:*
▪️ Aptos ocupados: ${ocup} | Disponibles: ${disp}
▪️ Check-ins: ${cki} | Check-outs: ${cko}
▪️ Caja al cierre: $${caja}

*NOVEDADES:*
${novResumen}

*PENDIENTES SIGUIENTE TURNO:*
${pend || '▪️ Sin pendientes ✓'}
${notas ? '\n*OBSERVACIONES:*\n' + notas : ''}`;

  const waEncoded = encodeURIComponent(msgWA);
  const waLink = waPhone ? `https://wa.me/${waPhone}?text=${waEncoded}` : `https://wa.me/?text=${waEncoded}`;

  const emailSubj = encodeURIComponent(`Informe Turno ${turno.split(' ')[0]} | ${d}/${m}/${y} | 8010 Principal`);
  const emailBody = encodeURIComponent(`Buenos días/tardes Santiago,\n\nResumen del turno ${turno} del ${d}/${m}/${y}:\n\nOcupación: ${ocup} aptos ocupados\nNovedades: ${novsToInsert.length}\nCaja al cierre: $${caja}\nTurno recibido por: ${recibe}\n\n---\n${msgWA}`);

  document.getElementById('main-content').innerHTML = `
    <div class="page-title">✅ Informe guardado</div>
    <div class="card" style="max-width:660px">
      <p style="color:var(--verde);font-weight:700;font-size:15px;margin-bottom:4px">✅ Informe de turno registrado en el sistema.</p>
      <p style="color:#666;font-size:13px;margin-bottom:20px">Ahora envíalo al grupo de WhatsApp y/o a gerencia por email.</p>

      <div style="background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:16px;margin-bottom:20px">
        <div style="font-size:11px;font-weight:700;color:#15803d;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Mensaje listo para WhatsApp</div>
        <pre id="wa-msg" style="white-space:pre-wrap;font-family:inherit;font-size:13px;line-height:1.8;margin:0;color:#1a2e1a">${msgWA}</pre>
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a href="${waLink}" target="_blank"
           style="display:inline-flex;align-items:center;gap:8px;background:#25D366;color:white;border:none;border-radius:8px;padding:13px 20px;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;min-width:200px;justify-content:center">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
          Abrir WhatsApp${waPhone ? '' : ' (elige contacto)'}
        </a>

        <button onclick="navigator.clipboard.writeText(document.getElementById('wa-msg').textContent);this.textContent='✅ Copiado!';setTimeout(()=>this.textContent='📋 Copiar texto',2000)"
          style="background:var(--gris);border:1px solid var(--gris-b);border-radius:8px;padding:13px 18px;font-size:13px;font-weight:600;cursor:pointer">
          📋 Copiar texto
        </button>

        <a href="mailto:santiago.arias@8010urbanliving.com?subject=${emailSubj}&body=${emailBody}"
          style="background:var(--azul-m);color:white;border:none;border-radius:8px;padding:13px 18px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px">
          📧 Email a Gerencia
        </a>

        <button onclick="loadView('dashboard')"
          style="background:transparent;border:1px solid var(--gris-b);border-radius:8px;padding:13px 18px;font-size:13px;cursor:pointer;color:#666">
          Ir al Dashboard
        </button>
      </div>

      ${!waPhone ? '<p style="font-size:11px;color:#888;margin-top:12px">💡 La próxima vez agrega el número de WhatsApp en el formulario para abrir el chat directo.</p>' : ''}
    </div>`;
}

}

async function enviarNovedad() {
  const desc = document.getElementById('n-desc').value.trim();
  if (!desc) { showToast('Describe la novedad antes de enviar', 'error'); return; }
  const btn = document.querySelector('.btn-success');
  btn.innerHTML = '<span class="spinner"></span>Guardando...'; btn.disabled = true;
  const accion = document.getElementById('n-accion').value.trim();
  const apto = document.getElementById('n-apto').value.trim();
  let descFinal = desc;
  if (accion) descFinal += `\n\n✅ Acción tomada: ${accion}`;
  const { error } = await sb.from('novedades').insert({
    fecha: document.getElementById('n-fecha').value,
    turno: document.getElementById('n-turno').value,
    area: apto ? `${document.getElementById('n-area').value} — ${apto}` : document.getElementById('n-area').value,
    prioridad: document.getElementById('n-prio').value,
    descripcion: descFinal,
    reportado_por: document.getElementById('n-quien').value,
    estado: document.getElementById('n-estado-ini').value,
    user_id: currentUser.id,
  });
  if (error) { showToast('Error al guardar', 'error'); btn.innerHTML = '📤 Reportar novedad'; btn.disabled = false; return; }
  showToast('✅ Novedad reportada', 'success');
  const prio = document.getElementById('n-prio').value;
  if (prio === 'Alta') {
    // Mostrar template de escalación para WhatsApp
    const quien = document.getElementById('n-quien').value;
    const area  = document.getElementById('n-area').value;
    const apto  = document.getElementById('n-apto').value;
    const now2  = new Date().toLocaleString('es-CO',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    const msgAlta = `🚨 *NOVEDAD ALTA — 8010 Urban Living*
📅 ${now2}
👤 Reporta: ${quien}
📍 Área: ${area}${apto?' — '+apto:''}

*Situación:*
${descFinal}

*Acción tomada:*
${accion || 'Pendiente definir'}

*Se requiere atención de Gerencia*`;
    document.getElementById('main-content').innerHTML = `
      <div class="page-title">🚨 Novedad Alta — Escalar a Gerencia</div>
      <div class="card" style="max-width:600px">
        <p style="color:var(--rojo);font-weight:600;margin-bottom:16px">⚠️ Novedad de prioridad ALTA guardada. Notifica a Gerencia ahora:</p>
        <div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:10px;padding:16px;margin-bottom:16px">
          <pre id="wa-alta" style="white-space:pre-wrap;font-family:inherit;font-size:13px;line-height:1.7;margin:0">${msgAlta}</pre>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-danger" onclick="navigator.clipboard.writeText(document.getElementById('wa-alta').textContent);this.textContent='✅ Copiado!';setTimeout(()=>this.innerHTML='📋 Copiar para WhatsApp',2000)" style="min-width:200px">📋 Copiar para WhatsApp</button>
          <button class="btn btn-outline btn-sm" onclick="loadView('novedades-list')" style="background:var(--gris)">Ver novedades</button>
        </div>
      </div>`;
  } else {
    setTimeout(() => loadView('novedades-list'), 1200);
  }
}

}

async function renderHKList() {
  const { data } = await sb.from('housekeeping').select('*').order('fecha', {ascending:false}).order('camarera').limit(200);
  const rows = data || [];

  // Calcular duración en minutos entre dos horas HH:MM
  function calcMin(ingreso, salida) {
    if (!ingreso || !salida) return null;
    const [hi, mi] = ingreso.split(':').map(Number);
    const [hs, ms] = salida.split(':').map(Number);
    const diff = (hs * 60 + ms) - (hi * 60 + mi);
    return diff > 0 ? diff : null;
  }
  function fmtMin(m) {
    if (!m) return '-';
    return m >= 60 ? `${Math.floor(m/60)}h ${m%60}min` : `${m} min`;
  }

  // Agrupar por fecha
  const porFecha = {};
  rows.forEach(h => {
    if (!porFecha[h.fecha]) porFecha[h.fecha] = [];
    porFecha[h.fecha].push(h);
  });

  // Promedio por camarera (global)
  const promedios = {};
  rows.forEach(h => {
    const m = calcMin(h.hora_ingreso, h.hora_salida);
    if (m && h.camarera) {
      if (!promedios[h.camarera]) promedios[h.camarera] = {total:0, count:0};
      promedios[h.camarera].total += m;
      promedios[h.camarera].count++;
    }
  });

  const fechas = Object.keys(porFecha).sort().reverse();

  document.getElementById('main-content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div class="page-title" style="margin-bottom:0">🧹 Tiempos de Camareras</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-danger btn-sm" onclick="declinarLimpiezaHK()" style="padding:10px 16px">🚫 Declina limpieza</button>

      <button class="btn btn-danger btn-sm" onclick="declinarLimpiezaHK()">🚫 Declina limpieza</button>
      <button class="btn btn-success btn-sm" onclick="loadView('hk-form')" style="padding:10px 20px">+ Registrar limpieza</button>
      </div>
    </div>

    ${Object.keys(promedios).length > 0 ? `
    <!-- Promedios globales por camarera -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title" style="margin-bottom:12px">📊 Promedio de tiempo por camarera</div>
      <div style="display:flex;flex-wrap:wrap;gap:12px">
        ${Object.entries(promedios).sort((a,b)=>a[0].localeCompare(b[0])).map(([nombre, d]) => {
          const avg = Math.round(d.total / d.count);
          const color = avg <= 30 ? 'var(--verde)' : avg <= 45 ? 'var(--naran)' : 'var(--rojo)';
          return `<div style="background:var(--gris);border-radius:10px;padding:14px 18px;text-align:center;min-width:140px;border-left:4px solid ${color}">
            <div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:4px">${nombre}</div>
            <div style="font-size:22px;font-weight:800;color:${color}">${fmtMin(avg)}</div>

          </div>`;
        }).join('')}
      </div>
    </div>` : ''}

    ${fechas.length === 0
      ? '<div class="card"><div class="empty"><div class="empty-icon">🧹</div><p>Sin registros de limpieza</p></div></div>'
      : fechas.map(fecha => {
          const dia = porFecha[fecha];
          // Promedio del día
          const minsDelDia = dia.map(h => calcMin(h.hora_ingreso, h.hora_salida)).filter(Boolean);
          const promDia = minsDelDia.length > 0 ? Math.round(minsDelDia.reduce((a,b)=>a+b,0)/minsDelDia.length) : null;
          return `
          <div class="card" style="margin-bottom:16px">
            <div class="card-header">
              <div class="card-title">📅 ${fmtDate(fecha)}</div>
              <div style="display:flex;gap:12px;align-items:center;font-size:12px;color:var(--gris-t)">
                ${promDia ? `<span>⏱ Promedio del día: <strong style="color:var(--azul)">${fmtMin(promDia)}</strong></span>` : ''}

              </div>
            </div>
            <div style="overflow-x:auto"><table class="tabla">
              <thead><tr><th>Apto</th><th>Camarera</th><th>Ingreso</th><th>Salida</th><th>⏱ Duración</th><th>Estado</th><th>Observaciones</th></tr></thead>
              <tbody>${dia.map(h => {
                const mins = calcMin(h.hora_ingreso, h.hora_salida);
                const durColor = !mins ? '#999' : mins <= 30 ? 'var(--verde)' : mins <= 45 ? 'var(--naran)' : 'var(--rojo)';
                return `<tr>
                  <td><strong style="color:var(--azul)">${h.apto}</strong></td>
                  <td>${h.camarera||'-'}</td>
                  <td style="font-weight:600">${h.hora_ingreso||'-'}</td>

                    ? `<strong>${h.hora_salida}</strong>`

                  }</td>

                  <td><span class="badge b-${h.estado==='Limpio'?'resuelto':h.estado==='Declina limpieza'?'alta':'proceso'}">${h.estado||'-'}</span></td>
                  <td style="max-width:140px;font-size:11px">${h.observaciones||'-'}</td>
                </tr>`;
              }).join('')}</tbody>
            </table></div>

        }).join('')}
  `;
}

async function renderDashFinanciero() {

    sb.from('maletas').select('id').eq('estado', 'En bodega'),
    sb.from('prestamos_tec').select('id').eq('estado', 'Prestado'),
    sb.from('contratos').select('fecha_vencimiento,apto,arrendatario').eq('estado','Activo'),
  ]);

      </div>
      <div class="kpi ${vencen30.length > 0 ? 'k-rojo' : 'k-verde'}">
        <div class="kpi-lbl">Contratos por vencer</div>
        <div class="kpi-val">${vencen30.length}</div>
        <div class="kpi-sub">Próximos 30 días</div>

      <div class="kpi k-naran">
        <div class="kpi-lbl">Maletas en bodega</div>
        <div class="kpi-val">${maletasPend}</div>
        <div class="kpi-sub">Por entregar</div>
      </div>
      <div class="kpi k-azul">
        <div class="kpi-lbl">Préstamos activos</div>
        <div class="kpi-val">${prestamosPend}</div>
        <div class="kpi-sub">Tecnología prestada</div>
      </div>
    </div>
    ${vencen30.length > 0 ? `

      <tbody>${vencen30.map(c => {
        const dias = Math.ceil((new Date(c.fecha_vencimiento) - hoy)/(1000*60*60*24));
        return `<tr><td><strong>${c.apto}</strong></td><td>${c.arrendatario}</td>

          <td><span class="badge ${dias<=7?'b-alta':dias<=15?'b-media':'b-baja'}">${dias} días</span></td></tr>`;

function calcReserva() {
  const ci = document.getElementById('res-checkin').value;
  const co = document.getElementById('res-checkout').value;
  const tarifa = Number(document.getElementById('res-tarifa').value) || 0;
  const moneda = document.getElementById('res-moneda')?.value || 'COP';
  const sym = moneda === 'USD' ? 'USD $' : '$';
  if (document.getElementById('res-moneda-sym')) document.getElementById('res-moneda-sym').textContent = sym;
  if (ci && co) {
    const noches = Math.max(0, Math.round((new Date(co) - new Date(ci)) / 86400000));
    document.getElementById('res-noches').value = noches;
    const total = noches * tarifa;
    document.getElementById('res-total').value = moneda === 'USD'
      ? `USD ${total.toLocaleString('es-CO')}`
      : `$ ${total.toLocaleString('es-CO')}`;
    // Mostrar resumen
    const apto = document.getElementById('res-apto').value;
    if (apto && noches > 0) {
      const resumen = document.getElementById('res-resumen');
      resumen.classList.remove('hidden');
      const fmtD = d => { const [y,m,day]=d.split('-'); return `${day}/${m}/${y}`; };
      document.getElementById('res-resumen-texto').innerHTML =
        `Apto <strong>${apto}</strong> · ${noches} noche${noches>1?'s':''} · ${fmtD(ci)} → ${fmtD(co)} · Tarifa: $${tarifa.toLocaleString('es-CO')}/noche · <strong>Total: $${(noches*tarifa).toLocaleString('es-CO')}</strong>`;
    }
  }
}

async function guardarReserva() {
  const apto    = document.getElementById('res-apto').value;
  const ci      = document.getElementById('res-checkin').value;
  const co      = document.getElementById('res-checkout').value;
  const nombre  = document.getElementById('res-nombre').value.trim();
  const tarifa  = Number(document.getElementById('res-tarifa').value) || 0;
  const noches  = Number(document.getElementById('res-noches').value) || 0;
  const canal   = document.getElementById('res-canal').value;

  if (!apto || !ci || !co || !nombre) {
    showToast('Completa: Apartamento, fechas y nombre del huésped', 'error'); return;
  }
  if (noches <= 0) { showToast('Las fechas no son válidas', 'error'); return; }

  const btn = document.querySelector('.btn-success');
  btn.innerHTML = '<span class="spinner"></span>Registrando...'; btn.disabled = true;

  // Crear un registro en rack por cada día de la estadía
  const rows = [];
  for (let i = 0; i < noches; i++) {
    const d = new Date(ci);
    d.setDate(d.getDate() + i);
    const fecha = d.toISOString().split('T')[0];
    const estado = i === 0 ? 'Check-in hoy' : (i === noches-1 ? 'Check-out hoy' : 'Ocupado');
    rows.push({ fecha, apto, estado, huesped: nombre, tarifa: tarifa || null, canal, updated_by: currentUser.id });
  }
  // Día de check-out
  const dco = new Date(co);
  rows.push({ fecha: co, apto, estado: 'Check-out hoy', huesped: nombre, tarifa: tarifa || null, canal, updated_by: currentUser.id });

  // Insertar — primero borrar días que ya existan para ese apto en ese rango
  await sb.from('rack').delete().eq('apto', apto).gte('fecha', ci).lte('fecha', co);
  const { error } = await sb.from('rack').insert(rows);

  if (error) {
    showToast('Error al registrar: ' + error.message, 'error');
    btn.innerHTML = '📤 Registrar Reserva'; btn.disabled = false; return;
  }

  // Guardar también en contratos si tiene empresa
  const empresa = document.getElementById('res-empresa').value.trim();
  if (empresa) {
    await sb.from('contratos').insert({
      apto, arrendatario: nombre, tipo: 'Contrato',
      fecha_inicio: ci, fecha_vencimiento: co, estado: 'Activo',
      observaciones: `${empresa} | Canal: ${canal}`, user_id: currentUser.id
    });
  }

  showToast(`✅ Reserva registrada — ${nombre} en Apto ${apto} (${noches} noches)`, 'success');

  // Generar confirmación automáticamente
  const resData = {
    nombre, apto, noches, tarifa,
    checkin: ci, checkout: co,
    canal, empresa: document.getElementById('res-empresa').value.trim(),
    pago: document.getElementById('res-pago').value,
    personas: document.getElementById('res-personas')?.value || '1 adulto',
    obs: document.getElementById('res-obs').value,
    firmante: document.getElementById('res-firmante').value || currentProfile?.nombre || 'Fabio Malaver',
    cargo: document.getElementById('res-cargo').value || 'Jefe de Administradores',
    email: document.getElementById('res-email').value.trim(),
    tel: document.getElementById('res-tel').value.trim(),
    numero: Math.floor(Math.random()*500)+400 // se puede hacer secuencial con una tabla
  };
  setTimeout(() => {
    if(confirm('¿Deseas generar la Confirmación de Reserva ahora?')) {
      generarConfirmacion(resData);
    } else {
      loadView('rack');
    }
  }, 800);
}

  const apto = document.getElementById('res-apto').value;

  const tarifa = Number(document.getElementById('res-tarifa').value) || 0;

function renderGenForm(tabla, titulo, campos) {
  const nombre = currentProfile?.nombre || '';
  const fieldsHTML = campos.map(f => {
    let input = '';
    const val = f.default || '';
    if (f.type === 'select') {
      input = `<select id="gf-${f.id}">${(f.opts||[]).map(o=>`<option value="${o}">${o}</option>`).join('')}</select>`;
    } else if (f.type === 'textarea') {
      input = `<textarea id="gf-${f.id}" placeholder="${f.label}..."></textarea>`;
    } else {
      input = `<input type="${f.type}" id="gf-${f.id}" value="${val}" placeholder="${f.label}${f.req?'*':''}">`;
    }
    return `<div class="form-group"><label>${f.label}${f.req?' *':''}</label>${input}</div>`;
  });

  // Agrupar en pares
  let rows = '';
  for (let i = 0; i < fieldsHTML.length; i += 2) {
    if (i + 1 < fieldsHTML.length) {
      rows += `<div class="form-row">${fieldsHTML[i]}${fieldsHTML[i+1]}</div>`;
    } else {
      rows += `<div class="form-row col1">${fieldsHTML[i]}</div>`;
    }
  }

  document.getElementById('main-content').innerHTML = `
    <div class="page-title">${titulo}</div>
    <div class="card" style="max-width:700px">
      ${rows}
      <div class="form-actions">
        <button class="btn btn-outline btn-sm" onclick="history.back()">Cancelar</button>
        <button class="btn btn-success" onclick="submitGenForm('${tabla}',${JSON.stringify(campos.map(f=>f.id)).replace(/"/g,'&quot;')},${JSON.stringify(campos.map(f=>f.req||false))})" style="min-width:160px">
          📤 Guardar registro
        </button>
      </div>
    </div>`;
}

async function submitGenForm(tabla, ids, reqs) {
  // Validar requeridos
  const faltantes = [];
  for (let i = 0; i < ids.length; i++) {
    if (reqs[i]) {
      const el = document.getElementById('gf-' + ids[i]);
      const v = el?.value?.trim();
      if (!v) {
        faltantes.push(ids[i].replace(/_/g,' '));
        if (el) el.style.border = '2px solid var(--rojo)';
      }
    }
  }
  if (faltantes.length > 0) {
    showToast('⚠️ Falta completar: ' + faltantes.join(', '), 'error');
    return;
  }

  const btn = document.querySelector('.btn-success');
  if (!btn) { console.error('No se encontró el botón de guardar'); return; }
  btn.innerHTML = '<span class="spinner"></span>Guardando...'; btn.disabled = true;

  const obj = { user_id: currentUser.id };
  ids.forEach(id => {
    const el = document.getElementById('gf-' + id);
    if (el) {
      const v = el.value.trim();
      obj[id] = v === '' ? null : (el.type === 'number' ? Number(v) || null : v);
    }
  });

  const { error } = await sb.from(tabla).insert(obj);
  if (error) {
    showToast('Error al guardar: ' + error.message, 'error');
    btn.innerHTML = '📤 Guardar registro'; btn.disabled = false;
    return;
  }
  showToast('✅ Registro guardado correctamente', 'success');
  const listaView = {
    'prestamos_tec': 'prestamos-list',
    'desayunos': 'desayunos-list',
    'maletas': 'maletas-list',
    'visitantes': 'visitantes-list',
    'capsulas': 'capsulas-list',
    'transportes': 'transportes-list',
    'requisiciones': 'requisiciones-list',
    'caja': 'caja-list',
  }[tabla] || (tabla.replace(/_/g,'-') + '-list');
  setTimeout(() => loadView(listaView), 1500);
}

async function renderList(tabla, titulo, formView, cols, headers) {
  const { data } = await sb.from(tabla).select('*').order('created_at', { ascending: false }).limit(100);
  const rows = data || [];

  const esVisitantes = tabla === 'visitantes';
  const tableRows = rows.map(r => {
    const celdas = cols.map(c => {
      let v = r[c];
      if (v === null || v === undefined) return '<td>-</td>';
      if (typeof v === 'boolean') return `<td>${v ? '✅' : '❌'}</td>`;
      if (String(c).includes('valor') || String(c).includes('costo')) return `<td>$${fmtNum(v)}</td>`;
      if (String(c).includes('fecha') && String(v).includes('-')) return `<td>${fmtDate(String(v).substring(0,10))}</td>`;
      if (c === 'estado') return `<td><span class="badge b-${v==='Activo'||v==='Ocupado'||v==='Prestado'?'proceso':v==='Resuelto'||v==='Devuelto'||v==='Recibido'?'resuelto':'alta'}">${v}</span></td>`;
      return `<td>${String(v).length > 35 ? String(v).substring(0,35)+'…' : v}</td>`;
    }).join('');
    // Columna de acciones
    let acciones = '';
    if (esVisitantes && !r.hora_salida) {
      acciones = `<td><button onclick="registrarSalidaVisita('${r.id}')" class="btn btn-outline btn-sm" style="padding:3px 10px;font-size:11px;color:var(--naran);border-color:var(--naran)">⏱ Salida</button></td>`;
    } else {
      acciones = '<td></td>';
    }
    return `<tr>${celdas}${acciones}</tr>`;
  }).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="page-title">${titulo}</div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">${rows.length} registros</div>
        <button class="btn btn-success btn-sm" onclick="loadView('${formView}')">+ Nuevo registro</button>
      </div>
      ${rows.length === 0
        ? '<div class="empty"><div class="empty-icon">📋</div><p>Sin registros todavía</p></div>'
        : `<div style="overflow-x:auto"><table class="tabla">
            <thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}<th></th></tr></thead>
            <tbody>${tableRows}</tbody>
           </table></div>`}
    </div>`;
}

function renderImportRack() {
  document.getElementById('main-content').innerHTML = `
    <div class="page-title">🔄 Importar Rack 2026</div>
    <div class="card" style="max-width:520px">
      <p style="color:#555;margin-bottom:16px;line-height:1.6">Carga los <strong>7,665 registros</strong> del Rack Gráfico 2026 (12 meses completos) directamente en el sistema.</p>
      <div id="ir-pct" style="font-size:32px;font-weight:800;color:var(--azul);text-align:center;margin:12px 0">—</div>
      <div style="height:8px;background:var(--gris-b);border-radius:4px;margin-bottom:20px;overflow:hidden">

      </div>
      <button class="btn btn-success" id="ir-btn" onclick="doImportRack()" style="margin-bottom:10px">▶ Iniciar importación</button>
      <div id="ir-log" style="background:var(--gris);border-radius:8px;padding:12px;height:200px;overflow-y:auto;font-size:11px;font-family:monospace"></div>
    </div>`;

async function doImportRack() {
  const btn = document.getElementById('ir-btn');
  btn.disabled = true; btn.textContent = 'Cargando...';

  function irLog(m, color='#555') {
    const d = document.getElementById('ir-log');
    const l = document.createElement('div');
    l.style.color = color; l.textContent = m;
    d.appendChild(l); d.scrollTop = d.scrollHeight;
  }

  irLog('Borrando datos anteriores de 2026...');
  const { error: de } = await sb.from('rack').delete().gte('fecha','2026-01-01').lte('fecha','2026-12-31');
  irLog(de ? 'Advertencia: '+de.message : '✓ Datos anteriores eliminados', de ? '#E74C3C' : '#27AE60');

  const batches = [];
  for (let i = 0; i < _RACK_ALL.length; i += 100) batches.push(_RACK_ALL.slice(i, i+100));

  let loaded = 0, errors = 0;
  for (let i = 0; i < batches.length; i++) {
    const { error } = await sb.from('rack').insert(batches[i]);
    if (error) { errors++; if(errors<=3) irLog('Error batch '+i+': '+error.message, '#E74C3C'); }
    else loaded += batches[i].length;
    const pct = Math.round(loaded/7665*100);
    document.getElementById('ir-bar').style.width = pct+'%';
    document.getElementById('ir-pct').textContent = pct+'%';
    if (i%10===0||i===batches.length-1) irLog('Batch '+(i+1)+'/'+batches.length+' — '+loaded+'/7665', '#2B4A8A');
    await new Promise(r=>setTimeout(r,20));
  }

  if (errors===0) {
    irLog('✅ LISTO — 7,665 registros cargados', '#27AE60');
    document.getElementById('ir-pct').textContent = '✅';
    btn.textContent = '✅ Importación completa'; btn.style.background='var(--verde)';
    showToast('✅ Rack 2026 importado — recarga el Rack para ver', 'success');
  } else {
    irLog('Completado con '+errors+' errores. '+loaded+' cargados.', '#E74C3C');
    btn.disabled=false; btn.textContent='Reintentar';
  }
}

           style="display:flex;align-items:center;gap:10px;background:#25D366;color:white;padding:12px 16px;border-radius:10px;text-decoration:none;font-weight:600;font-size:13px"

async function registrarSalidaPersonal(id) {
  const ahora = new Date().toTimeString().slice(0,5);
  const hora = prompt('Hora de salida (HH:MM):', ahora);
  if (!hora) return;
  const { error } = await sb.from('control_personal').update({ marcacion_salida: hora }).eq('id', id);
  if (error) { showToast('Error: ' + error.message, 'error'); return; }
  showToast('✅ Salida registrada', 'success');
  renderControlPersonal();
}

    fecha: TODAY, apto, camarera: camarera || 'Sin asignar',

  });

  // 2. Registrar novedad
  const { error: novErr } = await sb.from('novedades').insert({
    fecha: TODAY, turno, area: `Apartamento — ${apto}`,
    prioridad: 'Baja',

  const domingo = new Date(lunes); domingo.setDate(lunes.getDate() + 6);

  const semEnd   = domingo.toISOString().split('T')[0];
  const fmtS = d => { const [y,m,dd]=d.split('-'); return `${dd}/${m}`; };

  const [nov, mant, rack, reemb] = await Promise.all([
    sb.from('novedades').select('id,estado,prioridad,area,descripcion,created_at').gte('fecha',semStart).lte('fecha',semEnd),

  document.getElementById('main-content').innerHTML = `

      <div class="kpi ${mantPend>0?'k-naran':'k-verde'}"><div class="kpi-lbl">Mantenimiento</div><div class="kpi-val">${mantRows.length}</div><div class="kpi-sub">${mantPend} pendientes</div></div>
      <div class="kpi k-azul"><div class="kpi-lbl">Reembolsos</div><div class="kpi-val">${reembRows.length}</div><div class="kpi-sub">$${fmtNum(reembRows.reduce((s,r)=>s+Number(r.valor||0),0))}</div></div>
    </div>

    <div class="grid-2">

        `<table class="tabla"><thead><tr><th>Día</th><th>Área</th><th>Descripción</th><th>Estado</th></tr></thead>
        <tbody>${novRows.slice(0,8).map(n=>`<tr>

// FORMATO HUÉSPEDES MENSUAL (desde rack)

async function renderFormatoHuespedes() {
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const monthStart = `${year}-${String(month+1).padStart(2,'0')}-01`;
  const monthEnd   = `${year}-${String(month+1).padStart(2,'0')}-${String(daysInMonth).padStart(2,'0')}`;
  const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const dayNames = ['D','L','M','Mi','J','V','S'];

  const { data } = await sb.from('rack').select('*').gte('fecha',monthStart).lte('fecha',monthEnd).order('fecha');
  const rows = data||[];

  // Agrupar por apto
  const porApto = {};
  rows.forEach(r => {
    if(!porApto[r.apto]) porApto[r.apto] = {};
    porApto[r.apto][parseInt(r.fecha.split('-')[2])] = r;
  });

  const APTOS = [
    '301','302','303','304',
    '401','402','403',
    '501','501A','502','502A',
    '601','601A','602','602A',
    '701','701A','702','702A',
    '801','801A','802','802A',
    '901','901A','902','902A',
    '1001','1001A','1002','1002A',
    '1101','1102'
  ];
  const colorMap = {'Ocupado':'#C6EFCE','Check-in hoy':'#BDD7EE','Check-out hoy':'#FFEB9C','Libre':'#F2F2F2','Limpieza':'#E8D5F5','Mantenimiento':'#FCE4D6'};

  // Headers de días
  const dayHeaders = Array.from({length:daysInMonth},(_,i)=>{
    const d = new Date(year, month, i+1);
    const isHoy = i+1 === now.getDate() && month === now.getMonth();
    return `<th style="min-width:32px;padding:3px 2px;text-align:center;font-size:9px;background:${isHoy?'#1D3461':'#2B4A8A'};color:white;border-right:1px solid #fff3">
      <div style="font-weight:700">${i+1}</div>
      <div style="opacity:.7">${dayNames[d.getDay()]}</div>
    </th>`;
  }).join('');

  const filas = APTOS.map(apto => {
    const dias = porApto[apto] || {};
    const huesped = Object.values(dias).find(d=>d.huesped)?.huesped || 'Libre';
    const cells = Array.from({length:daysInMonth},(_,i)=>{
      const d = dias[i+1];
      const bg = d ? (colorMap[d.estado]||'#F2F2F2') : '#F2F2F2';
      const txt = d?.huesped ? d.huesped.split(' ')[0].substring(0,6) : (d?.estado==='Libre'?'':d?.estado?.substring(0,3)||'');
      const clickAct = d?.id ? `onclick="openAptoModal('${d.id}','${apto}')" style="cursor:pointer"` : '';
      return `<td ${clickAct} style="background:${bg};text-align:center;font-size:8px;padding:2px 1px;border-right:1px solid #eee;white-space:nowrap;overflow:hidden;max-width:32px" title="${d?.huesped||d?.estado||'Libre — clic para asignar'}">${txt}</td>`;
    }).join('');
    return `<tr><td style="position:sticky;left:0;background:white;font-weight:700;font-size:11px;color:#1D3461;padding:4px 8px;min-width:50px;border-right:2px solid #e2e4e8;z-index:1">${apto}</td>${cells}</tr>`;
  }).join('');

  document.getElementById('main-content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="page-title" style="margin-bottom:0">📅 Estado de Huéspedes — ${monthNames[month]} ${year}</div>
      <div style="display:flex;gap:6px">
        <button onclick="window.print()" class="btn btn-outline btn-sm">🖨️ Imprimir</button>
        <button onclick="compartirEstadoHuespedes()" class="btn btn-outline btn-sm" style="color:var(--verde);border-color:var(--verde)">📤 Compartir</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;font-size:11px">
      <span style="background:#C6EFCE;padding:2px 8px;border-radius:4px">Ocupado</span>
      <span style="background:#BDD7EE;padding:2px 8px;border-radius:4px">Check-in</span>
      <span style="background:#FFEB9C;padding:2px 8px;border-radius:4px">Check-out</span>
      <span style="background:#E8D5F5;padding:2px 8px;border-radius:4px">Limpieza</span>
      <span style="background:#F2F2F2;border:1px solid #ddd;padding:2px 8px;border-radius:4px">Libre</span>
    </div>
    <div style="overflow-x:auto;border-radius:8px;box-shadow:0 1px 8px rgba(0,0,0,.08)">
      <table style="border-collapse:collapse;min-width:100%">
        <thead><tr>
          <th style="position:sticky;left:0;z-index:2;background:#1D3461;color:white;padding:6px 8px;font-size:11px;min-width:50px">Apto</th>
          ${dayHeaders}
        </tr></thead>
        <tbody>${filas}</tbody>
      </table>
    </div>`;
}

  function calcMin(i,s){if(!i||!s)return null;const[hi,mi]=i.split(':').map(Number);const[hs,ms]=s.split(':').map(Number);const d=(hs*60+ms)-(hi*60+mi);return d>0?d:null;}

_Generado desde Sistema 8010 Urban Living_`;
  compartirInforme('Housekeeping — ' + fmtDate(TODAY), txt);
}

                <small style="color:var(--gris-t)">${r.arrendatario_autoriza||''}</small>
              </td>
              <td><strong style="color:var(--azul)">${r.apto||'-'}</strong></td>
              <td>${r.hora_ingreso||'-'}</td>
              <td>${r.hora_salida
                ? r.hora_salida
                : `<button onclick="registrarSalidaVisita('${r.id}')" class="btn btn-outline btn-sm" style="padding:3px 10px;font-size:11px;color:var(--naran);border-color:var(--naran)">⏱ Salida</button>`
              }</td>
              <td>${r.num_acompanantes||'0'}</td>
              <td>${r.pernocta
                ? '<span style="background:#FEF0E6;color:var(--naran);border:1px solid var(--naran);border-radius:12px;padding:3px 10px;font-size:11px;font-weight:700">🌙 Pernocta</span>'
                : '<span style="background:var(--verde-c);color:var(--verde);border-radius:12px;padding:3px 10px;font-size:11px;font-weight:600">Visita</span>'
              }</td>
              <td style="max-width:140px;font-size:11px">${r.observaciones||'-'}</td>
              <td>${!r.pernocta && !r.hora_salida
                ? `<button onclick="marcarPernocta('${r.id}')" class="btn btn-outline btn-sm" style="padding:3px 10px;font-size:11px;color:var(--naran);border-color:var(--naran)" title="Marcar que el visitante se queda a dormir">🌙 Pernocta</button>`
                : ''
              }</td>
            </tr>`).join('')}</tbody>
           </table></div>`}
    </div>`;
}

async function marcarPernocta(id) {
  const { error } = await sb.from('visitantes').update({ pernocta: true, observaciones: ((await sb.from('visitantes').select('observaciones').eq('id',id).single()).data?.observaciones || '') + ' — Pernocta autorizada.' }).eq('id', id);
  if (error) { showToast('Error: ' + error.message, 'error'); return; }
  showToast('🌙 Pernocta registrada', 'success');
  renderVisitantesList();
}

async function registrarSalidaVisita(id) {
  const ahora = new Date().toTimeString().slice(0,5);
  const hora = prompt('Hora de salida del visitante (HH:MM):', ahora);
  if (!hora) return;
  const { error } = await sb.from('visitantes').update({ hora_salida: hora }).eq('id', id);
  if (error) { showToast('Error: ' + error.message, 'error'); return; }
  showToast('✅ Hora de salida registrada', 'success');
  loadView('visitantes-list');
}
function fmtDate(d) { if (!d) return '-'; const [y,m,day] = d.split('-'); return `${day}/${m}/${y}`; }
function fmtHour(ts) { if (!ts) return '-'; return new Date(ts).toLocaleTimeString('es-CO', {hour:'2-digit',minute:'2-digit'}); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3500);
}

// ═══════════════════════════════════════════════════════════
// AUTO-LOGIN si hay sesión activa
// ═══════════════════════════════════════════════════════════
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    await loadProfile();
  }
})();
</script>
