// FORMATO HUÉSPEDES MENSUAL (desde rack)
// ═══════════════════════════════════════════════════════════
async function renderFormatoHuespedes() {
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const monthStart = `${year}-${String(month+1).padStart(2,'0')}-01`;
  const monthEnd   = `${year}-${String(month+1).padStart(2,'0')}-${String(daysInMonth).padStart(2,'0')}`;
  const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const dayNames = ['D','L','M','Mi','J','V','S'];

  const { data } = await sb.from('rack').select('*').gte('fecha',monthStart).lte('fecha',monthEnd).order('fecha');
  const rows = data||[];

  // Agrupar por apto
  const porApto = {};
  rows.forEach(r => {
    if(!porApto[r.apto]) porApto[r.apto] = {};
    porApto[r.apto][parseInt(r.fecha.split('-')[2])] = r;
  });

  const APTOS = [
    '301','302','303','304',
    '401','402','403',
    '501','501A','502','502A',
    '601','601A','602','602A',
    '701','701A','702','702A',
    '801','801A','802','802A',
    '901','901A','902','902A',
    '1001','1001A','1002','1002A',
    '1101','1102'
  ];
  const colorMap = {'Ocupado':'#C6EFCE','Check-in hoy':'#BDD7EE','Check-out hoy':'#FFEB9C','Libre':'#F2F2F2','Limpieza':'#E8D5F5','Mantenimiento':'#FCE4D6'};

  // Headers de días
  const dayHeaders = Array.from({length:daysInMonth},(_,i)=>{
    const d = new Date(year, month, i+1);
    const isHoy = i+1 === now.getDate() && month === now.getMonth();
    return `<th style="min-width:32px;padding:3px 2px;text-align:center;font-size:9px;background:${isHoy?'#1D3461':'#2B4A8A'};color:white;border-right:1px solid #fff3">
      <div style="font-weight:700">${i+1}</div>
      <div style="opacity:.7">${dayNames[d.getDay()]}</div>
    </th>`;
  }).join('');

  const filas = APTOS.map(apto => {
    const dias = porApto[apto] || {};
    const huesped = Object.values(dias).find(d=>d.huesped)?.huesped || 'Libre';
    const cells = Array.from({length:daysInMonth},(_,i)=>{
      const d = dias[i+1];
      const bg = d ? (colorMap[d.estado]||'#F2F2F2') : '#F2F2F2';
      const txt = d?.huesped ? d.huesped.split(' ')[0].substring(0,6) : (d?.estado==='Libre'?'':d?.estado?.substring(0,3)||'');
      const clickAct = d?.id ? `onclick="openAptoModal('${d.id}','${apto}')" style="cursor:pointer"` : '';
      return `<td ${clickAct} style="background:${bg};text-align:center;font-size:8px;padding:2px 1px;border-right:1px solid #eee;white-space:nowrap;overflow:hidden;max-width:32px" title="${d?.huesped||d?.estado||'Libre — clic para asignar'}">${txt}</td>`;
    }).join('');
    return `<tr><td style="position:sticky;left:0;background:white;font-weight:700;font-size:11px;color:#1D3461;padding:4px 8px;min-width:50px;border-right:2px solid #e2e4e8;z-index:1">${apto}</td>${cells}</tr>`;
  }).join('');

  document.getElementById('main-content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="page-title" style="margin-bottom:0">📅 Estado de Huéspedes — ${monthNames[month]} ${year}</div>
      <div style="display:flex;gap:6px">
        <button onclick="window.print()" class="btn btn-outline btn-sm">🖨️ Imprimir</button>
        <button onclick="compartirEstadoHuespedes()" class="btn btn-outline btn-sm" style="color:var(--verde);border-color:var(--verde)">📤 Compartir</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;font-size:11px">
      <span style="background:#C6EFCE;padding:2px 8px;border-radius:4px">Ocupado</span>
      <span style="background:#BDD7EE;padding:2px 8px;border-radius:4px">Check-in</span>
      <span style="background:#FFEB9C;padding:2px 8px;border-radius:4px">Check-out</span>
      <span style="background:#E8D5F5;padding:2px 8px;border-radius:4px">Limpieza</span>
      <span style="background:#F2F2F2;border:1px solid #ddd;padding:2px 8px;border-radius:4px">Libre</span>
    </div>
    <div style="overflow-x:auto;border-radius:8px;box-shadow:0 1px 8px rgba(0,0,0,.08)">
      <table style="border-collapse:collapse;min-width:100%">
        <thead><tr>
          <th style="position:sticky;left:0;z-index:2;background:#1D3461;color:white;padding:6px 8px;font-size:11px;min-width:50px">Apto</th>
          ${dayHeaders}
        </tr></thead>
        <tbody>${filas}</tbody>
      </table>
    </div>`;
}

function calcCKI() {
  const tarifa = Number(document.getElementById('cki-tarifa').value) || 0;
  const iva = Math.round(tarifa * 0.19);
  document.getElementById('cki-iva').value = iva;
  document.getElementById('cki-total').value = tarifa + iva;
}

function generarMsgCKI() {
  const apto = document.getElementById('cki-apto').value;
  const huesped = document.getElementById('cki-huesped').value.trim();
  const canal = document.getElementById('cki-canal').value;
  const fi = document.getElementById('cki-fi').value;
  const ff = document.getElementById('cki-ff').value;
  const tarifa = Number(document.getElementById('cki-tarifa').value) || 0;
  const iva = Math.round(tarifa * 0.19);
  const total = tarifa + iva;
  const fv = document.getElementById('cki-fv').value.trim();
  const pago = document.getElementById('cki-pago').value;
  const equipaje = document.getElementById('cki-equipaje').value;
  const quien = document.getElementById('cki-quien').value.trim();
  const obs = document.getElementById('cki-obs').value.trim();

  if (!huesped) { showToast('Ingresa el nombre del huésped', 'error'); return; }

  const [yi,mi,di] = fi.split('-');
  const [yf,mf,df] = ff ? ff.split('-') : ['-','-','-'];
  const fechasAloj = fi && ff ? `${di}/${mi}/${yi} - ${df}/${mf}/${yf}` : fi ? `desde ${di}/${mi}/${yi}` : '';

  const msg = `${new Date().getHours()<12?'Buenos días':'Buenas tardes'},
Realiza CKI ${huesped} (${canal==='Particular'?'Hab.':'Hab.'} ${apto} - ${canal})${fechasAloj?' // ALOJ '+fechasAloj:''} // TN:$${tarifa.toLocaleString('es-CO')} + IVA ($${iva.toLocaleString('es-CO')}) = $${total.toLocaleString('es-CO')}${fv?' se genera '+fv+' en '+pago:' pago en '+pago}, ${equipaje}, se relaciona check list, se envía book de servicios y se actualiza estado de huéspedes.${obs ? '\n'+obs : ''}
R/${quien}`;

  compartirInforme(`CKI — ${huesped} Apto ${apto}`, msg);
}

// ═══════════════════════════════════════════════════════════
function renderInformeCKO(aptoPreload, huesped, canal) {
  const nombre = currentProfile?.nombre || '';
  document.getElementById('main-content').innerHTML = `
    <div class="page-title">🔴 Informe de Check-Out</div>
    <div class="card" style="max-width:680px">
      <div class="form-row col3">
        <div class="form-group"><label>Apartamento *</label>
          <select id="cko-apto">
            ${['301','302','303','304','401','402','403','501','501A','502','502A','601','601A','602','602A','701','701A','702','702A','801','801A','802','802A','901','901A','902','902A','1001','1001A','1002','1002A','1101','1102'].map(a=>`<option ${a===aptoPreload?'selected':''}>${a}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Huésped *</label><input type="text" id="cko-huesped" value="${huesped||''}" placeholder="Sr./Sra. Nombre Apellido"></div>
        <div class="form-group"><label>Canal / Tipo</label><input type="text" id="cko-canal" value="${canal||''}" placeholder="Expedia/VIP, Booking..."></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Consumos adicionales ($)</label><input type="number" id="cko-consumos" placeholder="0" value="0"></div>
        <div class="form-group"><label>Forma de pago adicional</label>
          <select id="cko-pago"><option>Efectivo</option><option>Tarjeta</option><option>Transferencia</option><option>Sin consumos</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>No. Factura</label><input type="text" id="cko-fv" placeholder="FV UL0000"></div>
        <div class="form-group"><label>Migración Colombia</label>
          <select id="cko-migracion"><option>Sí, se envía reporte</option><option>No aplica</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Encuesta satisfacción</label>
          <select id="cko-encuesta"><option>Enviada por solicitud</option><option>Enviada automática</option><option>No enviada</option></select>
        </div>
        <div class="form-group"><label>Maletas</label>
          <select id="cko-maletas"><option>Sin maletas</option><option>Deja 1 maleta para recoger</option><option>Deja 2 maletas para recoger</option><option>Deja 3 maletas para recoger</option><option>Se lleva todo</option></select>
        </div>
      </div>
      <div class="form-group"><label>Quien reporta</label><input type="text" id="cko-quien" value="${nombre}" placeholder="Tu nombre"></div>
      <div class="form-group"><label>Observaciones adicionales</label><textarea id="cko-obs" placeholder="Detalles adicionales..." style="min-height:60px"></textarea></div>
      <div class="form-actions">
        <button class="btn btn-outline btn-sm" onclick="loadView(window._currentView||'dashboard')">Cancelar</button>
        <button class="btn btn-danger" onclick="generarMsgCKO()" style="min-width:200px">📤 Generar Informe CKO</button>
      </div>
    </div>`;
}

function generarMsgCKO() {
  const apto = document.getElementById('cko-apto').value;
  const huesped = document.getElementById('cko-huesped').value.trim();
  const canal = document.getElementById('cko-canal').value.trim();
  const consumos = Number(document.getElementById('cko-consumos').value) || 0;
  const pago = document.getElementById('cko-pago').value;
  const fv = document.getElementById('cko-fv').value.trim();
  const migracion = document.getElementById('cko-migracion').value;
  const encuesta = document.getElementById('cko-encuesta').value;
  const maletas = document.getElementById('cko-maletas').value;
  const quien = document.getElementById('cko-quien').value.trim();
  const obs = document.getElementById('cko-obs').value.trim();

  if (!huesped) { showToast('Ingresa el nombre del huésped', 'error'); return; }

  const h = new Date().getHours();
  const consumosStr = consumos > 0 ? `, realiza el pago de sus consumos adicionales ($${consumos.toLocaleString('es-CO')} ${pago})` : '';
  const fvStr = fv ? `, se genera ${fv}` : '';
  const mig = migracion.includes('Sí') ? ', se envía reporte de salida a Migración Colombia' : '';
  const enc = encuesta.includes('No') ? '' : ', se envía encuesta de satisfacción por solicitud';
  const maletasStr = maletas === 'Sin maletas' || maletas === 'Se lleva todo' ? '' : `. ${maletas.replace('Deja','Deja')} las cuales vendrán a recogerlas`;

  const msg = `${h<12?'Buenos días':'Buenas tardes'},
Realiza CKO ${huesped} (apto. ${apto}${canal?' - '+canal:''})${consumosStr}${fvStr}${mig}${enc} y se actualiza estado de huéspedes${maletasStr}.${obs?'\n'+obs:''}
R/${quien}`;

  // Mostrar modal de compartir + botón para marcar como Libre
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center';
  const waText = encodeURIComponent('*8010 Urban Living — CKO — ' + huesped + ' Apto ' + apto + '*\n\n' + msg);
  const emailSubj = encodeURIComponent('8010 Urban Living — CKO ' + huesped + ' Apto ' + apto);
  const emailBody = encodeURIComponent(msg);
  modal.innerHTML = `
    <div style="background:white;border-radius:16px;padding:28px 32px;max-width:440px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.3)">
      <div style="font-size:18px;font-weight:700;color:#1D3461;margin-bottom:6px">🔴 Informe CKO generado</div>
      <div style="font-size:13px;color:#6B7280;margin-bottom:16px">${huesped} — Apto ${apto}</div>
      <div style="background:#F2F3F5;border-radius:8px;padding:12px;font-size:11px;color:#374151;max-height:150px;overflow-y:auto;white-space:pre-wrap;margin-bottom:16px;font-family:monospace">${msg.substring(0,400)}...</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <a href="https://wa.me/?text=${waText}" target="_blank"
           style="display:flex;align-items:center;gap:10px;background:#25D366;color:white;padding:12px 16px;border-radius:10px;text-decoration:none;font-weight:600;font-size:13px">
          💬 Enviar por WhatsApp
        </a>
        <a href="mailto:?subject=${emailSubj}&body=${emailBody}"
           style="display:flex;align-items:center;gap:10px;background:#1D3461;color:white;padding:12px 16px;border-radius:10px;text-decoration:none;font-weight:600;font-size:13px">
          📧 Enviar por Email
        </a>
        <button id="cko-libre-btn" onclick="marcarAptoCKOLibre('${apto}')"
           style="background:#C0392B;color:white;border:none;padding:12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700">
          ✅ Confirmar salida — Marcar Apto ${apto} como Libre
        </button>
        <button onclick="document.body.removeChild(this.closest('[style*=fixed]'))"
           style="background:transparent;border:none;padding:6px;cursor:pointer;font-size:12px;color:#9CA3AF">
          Cerrar sin actualizar rack
        </button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function marcarAptoCKOLibre(apto) {
  const { error } = await sb.from('rack').update({ estado: 'Libre', huesped: null, tarifa: null, canal: null, observaciones: null, updated_by: currentUser.id }).eq('fecha', TODAY).eq('apto', apto);
  if (error) { showToast('Error: ' + error.message, 'error'); return; }
  // Cerrar modal
  const m = document.querySelector('[style*="position:fixed"][style*="inset:0"]');
  if (m) document.body.removeChild(m);
  showToast(`✅ Apto ${apto} marcado como Libre — CKO completado`, 'success');
  if (window._currentView === 'rack') renderRack();
  if (window._currentView === 'estado-huespedes') renderEstadoHuespedes();
}

      <div class="page-title" style="margin-bottom:0">💵 Entrega de Efectivos</div>
      <button class="btn btn-success btn-sm" onclick="loadView('entrega-efectivos-form')" style="padding:10px 20px">+ Nueva Entrega</button>

    <div class="card">
      ${rows.length===0?'<div class="empty"><div class="empty-icon">💵</div><p>Sin entregas registradas</p></div>':
      `<div style="overflow-x:auto"><table class="tabla">
        <thead><tr><th>Fecha</th><th>Turno</th><th>Entrega</th><th>Recibe</th><th>LTM3</th><th>OT</th><th>PH</th><th>Total</th></tr></thead>

async function compartirEstadoHuespedes() {
  const { data: _rd } = await sb.from('rack').select('*').eq('fecha', TODAY);
  const data = (_rd||[]).sort((a,b)=>(parseInt(a.apto)||0)-(parseInt(b.apto)||0));
  const rows = data.filter(r => r.estado !== 'Libre');
  const ocu = rows.filter(r=>r.estado==='Ocupado').length;
  const cki = rows.filter(r=>r.estado==='Check-in hoy').length;
  const cko = rows.filter(r=>r.estado==='Check-out hoy').length;
  const ingresos = rows.filter(r=>r.tarifa).reduce((s,r)=>s+Number(r.tarifa),0);
  const txt = `🏢 *8010 Urban Living — Estado de Huéspedes*
📅 Fecha: ${fmtDate(TODAY)}

*OCUPACIÓN:* ${rows.length}/21 aptos (${Math.round(rows.length/21*100)}%)
▪️ Ocupados: ${ocu} | Check-in: ${cki} | Check-out: ${cko}
▪️ Ingresos del día: $${fmtNum(ingresos)} COP

*DETALLE POR APTO:*
${rows.map(r=>`▪️ Apto ${r.apto} — ${r.huesped||'N/A'} [${r.estado}]${r.tarifa?' $'+fmtNum(r.tarifa):''}`).join('\n')}

_Generado desde Sistema 8010 Urban Living_`;
  compartirInforme('Estado de Huéspedes — ' + fmtDate(TODAY), txt);
}

async function compartirHK() {
  const { data } = await sb.from('housekeeping').select('*').eq('fecha', TODAY).order('camarera');
  const rows = data || [];
  const completadas = rows.filter(r=>r.estado==='Limpio').length;
  function calcMin(i,s){if(!i||!s)return null;const[hi,mi]=i.split(':').map(Number);const[hs,ms]=s.split(':').map(Number);const d=(hs*60+ms)-(hi*60+mi);return d>0?d:null;}
  const tiempos = rows.map(r=>calcMin(r.hora_ingreso,r.hora_salida)).filter(Boolean);
  const prom = tiempos.length>0?Math.round(tiempos.reduce((a,b)=>a+b,0)/tiempos.length):0;
  const txt = `🧹 *8010 Urban Living — Informe Housekeeping*
📅 Fecha: ${fmtDate(TODAY)}

▪️ Aptos limpiados: ${completadas}/${rows.length}
▪️ Tiempo promedio: ${prom} min

*DETALLE:*
${rows.map(r=>{const m=calcMin(r.hora_ingreso,r.hora_salida);return`▪️ Apto ${r.apto} — ${r.camarera||'N/A'} | ${r.hora_ingreso||'--'} → ${r.hora_salida||'--'} | ${m?m+' min':'pendiente'} | ${r.estado||'-'}`;}).join('\n')}

_Generado desde Sistema 8010 Urban Living_`;
  compartirInforme('Housekeeping — ' + fmtDate(TODAY), txt);
}

async function compartirNovedades() {
  const { data } = await sb.from('novedades').select('*').in('estado',['Abierto','En proceso','Escalado']).order('created_at',{ascending:false});
  const rows = data || [];
  const txt = `⚠️ *8010 Urban Living — Novedades Abiertas*
📅 ${fmtDate(TODAY)} — ${rows.length} novedades activas

${rows.map(r=>`▪️ [${r.prioridad}] ${r.area||'General'} — ${r.descripcion?.substring(0,80)} | Estado: ${r.estado}`).join('\n')||'Sin novedades abiertas ✅'}

_Generado desde Sistema 8010 Urban Living_`;
  compartirInforme('Novedades abiertas — ' + fmtDate(TODAY), txt);
}

async function getNextNumeroConfirmacion() {
  try {
    // Leer número actual
    const { data } = await sb.from('config').select('valor').eq('id','ultimo_numero_confirmacion').single();
    const actual = parseInt(data?.valor || '423');
    const siguiente = actual + 1;
    // Actualizar a siguiente
    await sb.from('config').upsert({ id: 'ultimo_numero_confirmacion', valor: String(siguiente), updated_at: new Date().toISOString() });
    return siguiente;
  } catch(e) {
    // Fallback si falla
    return Math.floor(Math.random()*50)+424;
  }
}

function calcCajaTurno() {
  const ltm3 = Number(document.getElementById('t-caja-ltm3')?.value) || 0;
  const ot   = Number(document.getElementById('t-caja-ot')?.value) || 0;
  const ph   = Number(document.getElementById('t-caja-ph')?.value) || 0;
  const total = ltm3 + ot + ph;
  const el = document.getElementById('t-caja');
  if (el) el.value = total;
}

async function registrarSalidaHK(id) {
  const ahora = new Date().toTimeString().slice(0,5);
  const hora = prompt('Hora de salida (HH:MM):', ahora);
  if (!hora) return;
  const { error } = await sb.from('housekeeping').update({ hora_salida: hora, estado: 'Limpio' }).eq('id', id);
  if (error) { showToast('Error: ' + error.message, 'error'); return; }
  showToast('✅ Hora de salida registrada', 'success');
  renderHKList();
}

async function renderVisitantesList() {
  const { data } = await sb.from('visitantes').select('*').order('created_at', {ascending:false}).limit(100);
  const rows = data || [];
  const pernoctas = rows.filter(r => r.pernocta);

  document.getElementById('main-content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div class="page-title" style="margin-bottom:0">👥 Registro de Visitantes</div>
      <button class="btn btn-success btn-sm" onclick="loadView('visitantes-form')" style="padding:10px 20px">+ Registrar visitante</button>
    </div>

    ${pernoctas.length > 0 ? `
    <div style="background:#FEF0E6;border:2px solid var(--naran);border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px">
      <span style="font-size:24px">🌙</span>
      <div>
        <div style="font-weight:700;color:var(--naran);font-size:14px">PERNOCTAS ACTIVAS — ${pernoctas.length} visitante${pernoctas.length>1?'s':''}</div>
        <div style="font-size:12px;color:#7c4a03">${pernoctas.map(p=>`<strong>${p.nombre_visitante}</strong> (Apto ${p.apto})`).join(' · ')}</div>
      </div>
    </div>` : ''}

    <div class="card" style="padding:10px">
      ${rows.length === 0
        ? '<div class="empty"><div class="empty-icon">👥</div><p>Sin visitantes registrados</p></div>'
        : `<div style="overflow-x:auto"><table class="tabla">
            <thead><tr><th>Fecha</th><th>Visitante</th><th>Apto</th><th>Ingreso</th><th>Salida</th><th>Acomp.</th><th>Estado</th><th>Obs.</th><th></th></tr></thead>
            <tbody>${rows.map(r => `<tr style="${r.pernocta ? 'background:#fff8f0;border-left:3px solid var(--naran)' : ''}">
              <td>${fmtDate(r.fecha || (r.created_at?r.created_at.split('T')[0]:null))}</td>
              <td><strong>${r.nombre_visitante||'-'}</strong><br>
                <small style="color:var(--gris-t)">${r.arrendatario_autoriza||''}</small>
              </td>
              <td><strong style="color:var(--azul)">${r.apto||'-'}</strong></td>
              <td>${r.hora_ingreso||'-'}</td>
              <td>${r.hora_salida
                ? r.hora_salida
                : `<button onclick="registrarSalidaVisita('${r.id}')" class="btn btn-outline btn-sm" style="padding:3px 10px;font-size:11px;color:var(--naran);border-color:var(--naran)">⏱ Salida</button>`
              }</td>
              <td>${r.num_acompanantes||'0'}</td>
              <td>${r.pernocta
                ? '<span style="background:#FEF0E6;color:var(--naran);border:1px solid var(--naran);border-radius:12px;padding:3px 10px;font-size:11px;font-weight:700">🌙 Pernocta</span>'
                : '<span style="background:var(--verde-c);color:var(--verde);border-radius:12px;padding:3px 10px;font-size:11px;font-weight:600">Visita</span>'
              }</td>
              <td style="max-width:140px;font-size:11px">${r.observaciones||'-'}</td>
              <td>${!r.pernocta && !r.hora_salida
                ? `<button onclick="marcarPernocta('${r.id}')" class="btn btn-outline btn-sm" style="padding:3px 10px;font-size:11px;color:var(--naran);border-color:var(--naran)" title="Marcar que el visitante se queda a dormir">🌙 Pernocta</button>`
                : ''
              }</td>
            </tr>`).join('')}</tbody>
           </table></div>`}
    </div>`;
}

async function marcarPernocta(id) {
  const { error } = await sb.from('visitantes').update({ pernocta: true, observaciones: ((await sb.from('visitantes').select('observaciones').eq('id',id).single()).data?.observaciones || '') + ' — Pernocta autorizada.' }).eq('id', id);
  if (error) { showToast('Error: ' + error.message, 'error'); return; }
  showToast('🌙 Pernocta registrada', 'success');
  renderVisitantesList();
}

async function registrarSalidaVisita(id) {
  const ahora = new Date().toTimeString().slice(0,5);
  const hora = prompt('Hora de salida del visitante (HH:MM):', ahora);
  if (!hora) return;
  const { error } = await sb.from('visitantes').update({ hora_salida: hora }).eq('id', id);
  if (error) { showToast('Error: ' + error.message, 'error'); return; }
  showToast('✅ Hora de salida registrada', 'success');
  loadView('visitantes-list');
}
function fmtDate(d) { if (!d) return '-'; const [y,m,day] = d.split('-'); return `${day}/${m}/${y}`; }
function fmtHour(ts) { if (!ts) return '-'; return new Date(ts).toLocaleTimeString('es-CO', {hour:'2-digit',minute:'2-digit'}); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3500);
}
